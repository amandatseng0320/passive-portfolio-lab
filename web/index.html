<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Passive Portfolio Lab</title>

  <!-- Design system tokens -->
  <link rel="stylesheet" href="src/colors_and_type.css" />

  <!-- Google Font: Source Sans 3 -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet" />

  <!-- React 18 (development build — swap to production for deployment) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel (in-browser JSX transform — no build step required) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>

  <!-- chartjs-plugin-annotation (event shading + reference lines) -->
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body, #root {
      height: 100%;
      font-family: 'Source Sans 3', system-ui, -apple-system, sans-serif;
      background: #f7f9fc;
      color: #111;
      -webkit-font-smoothing: antialiased;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #c8cdd6; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #9aa0ad; }

    /* Main layout: sidebar is sticky; main scrolls independently */
    #root { display: flex; }
    main  { flex: 1; overflow-y: auto; min-width: 0; }

    /* Table row hover */
    tbody tr:hover { background: #f0f6ff !important; }

    /* Input focus */
    input:focus, select:focus {
      outline: none;
      border-color: #4182b9 !important;
      box-shadow: 0 0 0 3px rgba(65,130,185,0.12);
    }

    /* Nav scrollbar (sidebar) */
    nav::-webkit-scrollbar { width: 4px; }
    nav::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

    /* Prevent text selection on nav buttons */
    nav button { user-select: none; }

    /* Loading placeholder */
    #loading {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: #0d1f3c; color: #a8cae8;
      font-family: 'Source Sans 3', system-ui, sans-serif;
      font-size: 14px; letter-spacing: 0.06em;
      z-index: 9999;
    }
  </style>
</head>
<body>

  <div id="loading">Loading Passive Portfolio Lab…</div>
  <div id="root"></div>

  <!-- Register annotation plugin -->
  <script>
    Chart.register(ChartAnnotation);
  </script>

  <!-- Data layer (plain JS — no JSX) -->
  <script src="src/ppl-data.js"></script>

  <!-- Shared components (JSX — transpiled by Babel) -->
  <script type="text/babel" src="src/ppl-components.jsx"></script>

  <!-- Main application (JSX) -->
  <script type="text/babel" src="src/ppl-app.jsx"></script>

  <!-- Hide loading screen once React mounts -->
  <script>
    (function waitForRoot() {
      const observer = new MutationObserver(() => {
        const root = document.getElementById('root');
        if (root && root.children.length > 0) {
          const loader = document.getElementById('loading');
          if (loader) loader.style.display = 'none';
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById('root'), { childList: true });
    })();
  </script>

</body>
</html>
