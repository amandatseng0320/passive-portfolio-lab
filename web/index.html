  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body, #root {
      height: 100%;
      font-family: 'Source Sans 3', system-ui, -apple-system, sans-serif;
      background: #f7f9fc;
      color: #111;
      -webkit-font-smoothing: antialiased;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #c8cdd6; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #9aa0ad; }

    /* Main layout: sidebar is sticky; main scrolls independently */
    #root { display: flex; }
    main  { flex: 1; overflow-y: auto; min-width: 0; }

    /* Table row hover */
    tbody tr:hover { background: #f0f6ff !important; }

    /* Input focus */
    input:focus, select:focus {
      outline: none;
      border-color: #4182b9 !important;
      box-shadow: 0 0 0 3px rgba(65,130,185,0.12);
    }

    /* Nav scrollbar (sidebar) */
    nav::-webkit-scrollbar { width: 4px; }
    nav::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

    /* Prevent text selection on nav buttons */
    nav button { user-select: none; }

    /* Loading placeholder */
    #loading {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: #0d1f3c; color: #a8cae8;
      font-family: 'Source Sans 3', system-ui, sans-serif;
      font-size: 14px; letter-spacing: 0.06em;
      z-index: 9999;
    }
  </style>
</head>

// SHARED COMPONENTS
// ─────────────────────────────────────────────────────────────────────────────

// ── Badge ─────────────────────────────────────────────────────────────────────
const Badge = ({ label, variant = 'blue' }) => {
  const colors = {
    blue:  ['#d2e4f5','#0a326e'],
    green: ['#d4f0e0','#0e5a2a'],
    amber: ['#fef3c7','#7a4a00'],
    gray:  ['#f0f2f6','#555'],
    red:   ['#fff5f5','#c0392b'],
    navy:  ['#0a326e','#fff'],
  };
  const [bg, color] = colors[variant] || colors.gray;
  return (
    <span style={{
      display: 'inline-block', padding: '2px 8px', borderRadius: 9999,
      fontSize: 11, fontWeight: 700, letterSpacing: '0.04em',
      textTransform: 'uppercase', background: bg, color,
    }}>
      {label}
    </span>
  );
};

// ── MetricCard ────────────────────────────────────────────────────────────────
const MetricCard = ({ label, value, delta, deltaPositive, sub }) => (
  <div style={{
    background: '#fff', border: '1px solid #e8edf3', borderRadius: 10,
    padding: '16px 20px', minWidth: 0, boxShadow: '0 1px 3px rgba(0,0,0,0.06)',
  }}>
    <div style={{
      fontSize: 11, color: '#6b727e', fontWeight: 700, textTransform: 'uppercase',
      letterSpacing: '0.06em', marginBottom: 6,
    }}>{label}</div>
    <div style={{ fontSize: '1.5rem', fontWeight: 700, color: '#111', lineHeight: 1.15 }}>{value}</div>
    {delta && (
      <div style={{ fontSize: 12, color: deltaPositive ? '#21a350' : '#e53e3e', marginTop: 5, fontWeight: 600 }}>
        {delta}
      </div>
    )}
    {sub && <div style={{ fontSize: 12, color: '#999', marginTop: 3 }}>{sub}</div>}
  </div>
);

// ── SectionTitle ──────────────────────────────────────────────────────────────
const SectionTitle = ({ icon, title, caption }) => (

      {icon && <span style={{ fontSize: 22 }}>{icon}</span>}

    </div>
    {caption && (

      height: 3, width: 48, background: '#4182b9', borderRadius: 9999,
      marginTop: 10, marginLeft: icon ? 32 : 0,
    }} />
  </div>

// ── InfoBanner ────────────────────────────────────────────────────────────────
const InfoBanner = ({ children, type = 'info' }) => {
  const styles = {
    info:    { bg: '#eff5fb', border: '#4182b9', color: '#1f3b5c' },
    success: { bg: '#f0faf4', border: '#21a350', color: '#0e5a2a' },
    warning: { bg: '#fff8f0', border: '#e8a000', color: '#7a4a00' },
    error:   { bg: '#fff5f5', border: '#e53e3e', color: '#7a0000' },
  };
  const s = styles[type] || styles.info;
  return (
    <div style={{
      background: s.bg, borderLeft: `3px solid ${s.border}`, color: s.color,
      borderRadius: 6, padding: '10px 16px', fontSize: 14,
      lineHeight: 1.65, marginBottom: 20,
    }}>
      {children}
    </div>
  );
};

// ── Btn ───────────────────────────────────────────────────────────────────────
const Btn = ({ children, onClick, variant = 'primary', disabled = false, small = false }) => {
  const variants = {
    primary:   { bg: '#4182b9', color: '#fff',   border: '#4182b9', hbg: '#1e5a96', hborder: '#1e5a96' },
    secondary: { bg: 'transparent', color: '#4182b9', border: '#4182b9', hbg: '#eff5fb', hborder: '#4182b9' },
    ghost:     { bg: '#f0f2f6', color: '#333',   border: '#e0e4eb', hbg: '#e0e4eb',  hborder: '#c8cdd6' },
    danger:    { bg: '#e53e3e', color: '#fff',   border: '#e53e3e', hbg: '#c0392b',  hborder: '#c0392b' },
  };
  const v = variants[variant] || variants.primary;
  const [hover, setHover] = React.useState(false);
  return (
    <button
      onClick={onClick}
      disabled={disabled}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{
        display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 6,
        padding: small ? '5px 12px' : '8px 18px', borderRadius: 6,
        fontSize: small ? 13 : 14, fontWeight: 600,
        cursor: disabled ? 'not-allowed' : 'pointer',
        border: `1px solid ${disabled ? '#d0d7e2' : (hover ? v.hborder : v.border)}`,
        background: disabled ? '#f0f2f6' : (hover ? v.hbg : v.bg),
        color: disabled ? '#aaa' : v.color,
        transition: 'all 0.15s', fontFamily: 'inherit',
      }}
    >
      {children}
    </button>
  );
};

// ── ChartLine ─────────────────────────────────────────────────────────────────
const ChartLine = ({ labels, datasets, height = 260, yFmt, events = [], extraInfo = [], hLines = [], lang = 'en' }) => {
  const ref = React.useRef();
  const chartRef = React.useRef();

  React.useEffect(() => {
    if (!ref.current) return;
    if (chartRef.current) chartRef.current.destroy();

    const EV_COLORS = {
      red:    { bg: 'rgba(229,62,62,0.09)',  border: 'rgba(229,62,62,0.30)',  text: '#c53030' },
      orange: { bg: 'rgba(214,105,0,0.09)',  border: 'rgba(214,105,0,0.30)',  text: '#a05000' },
      purple: { bg: 'rgba(107,57,196,0.09)', border: 'rgba(107,57,196,0.30)', text: '#6b39c4' },
    };

    const annotations = {};

    events.forEach((ev, i) => {
      const ec = EV_COLORS[ev.color] || EV_COLORS.red;
      const evLabel = lang === 'zh' ? (ev.labelZh || ev.label) : ev.label;
      annotations[`evBox${i}`] = {
        type: 'box', xMin: ev.xMin, xMax: ev.xMax,
        backgroundColor: ec.bg, borderColor: ec.border, borderWidth: 1,
      };
      annotations[`evLine${i}`] = {
        type: 'line', xMin: ev.xMin, xMax: ev.xMin,
        borderColor: ec.border, borderWidth: 1.5, borderDash: [3, 3],
        label: {
          display: true, content: evLabel, position: 'start', color: ec.text,
          backgroundColor: 'rgba(255,255,255,0.90)',
          font: { size: 10, weight: '600' },
          padding: { x: 5, y: 3 }, borderRadius: 4,
          yAdjust: 6, xAdjust: 4,
        },
      };
    });

    hLines.forEach((hl, i) => {
      annotations[`hLine${i}`] = {
        type: 'line', yMin: hl.value, yMax: hl.value,
        borderColor: hl.color || 'rgba(150,150,150,0.35)',
        borderWidth: 1, borderDash: [5, 4],
        label: {
          display: true, content: hl.label, position: '100%',
          color: hl.color || '#999', backgroundColor: 'transparent',
          font: { size: 10, weight: '600' }, xAdjust: -4,
        },
      };
    });

    chartRef.current = new Chart(ref.current, {
      type: 'line',
      data: { labels, datasets },
      options: {
        responsive: true, maintainAspectRatio: false,
        animation: { duration: 400 },
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: {
            position: 'top',
            labels: { boxWidth: 10, font: { size: 12 }, usePointStyle: true, pointStyleWidth: 10 },
          },
          tooltip: {
            backgroundColor: '#0d1f3c',
            titleColor: '#a8cae8',
            bodyColor: '#d2e4f5',
            borderColor: '#1e5a96',
            borderWidth: 1,
            padding: { x: 14, y: 12 },
            cornerRadius: 8,
            titleFont: { size: 12, weight: '700' },
            bodyFont: { size: 12 },
            callbacks: {
              title: items => '📅 ' + items[0].label,
              label: ctx => {
                const v = ctx.parsed.y;
                const fmt = yFmt ? yFmt(v, ctx.dataset.label) : v.toLocaleString();
                return `  ${ctx.dataset.label}: ${fmt}`;
              },
              afterBody: items => {
                const idx = items[0].dataIndex;
                if (extraInfo.length && extraInfo[idx] !== undefined) {
                  const dd = extraInfo[idx];
                  const bar = dd < -30 ? '🔴' : dd < -15 ? '🟡' : '🟢';
                  return ['', `  ${bar} Drawdown: ${dd.toFixed(1)}%`];
                }
                return [];
              },
            },
          },
          annotation: { annotations },
        },
        scales: {
          x: {
            grid: { display: false },
            ticks: { maxTicksLimit: 10, font: { size: 11 }, color: '#888' },
          },
          y: {
            grid: { color: '#f0f2f6' },
            ticks: {
              font: { size: 11 }, color: '#888',
              callback: v => yFmt ? yFmt(v) : v.toLocaleString(),
            },
          },
        },
      },
    });

    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [
    JSON.stringify(labels),
    JSON.stringify(datasets),
    JSON.stringify(events),
    JSON.stringify(hLines),
    JSON.stringify(extraInfo),
    lang,
  ]);

  return <div style={{ height, position: 'relative' }}><canvas ref={ref} /></div>;
};

// ── ChartBar ──────────────────────────────────────────────────────────────────
const ChartBar = ({ labels, data, height = 220 }) => {
  const ref = React.useRef();
  const chartRef = React.useRef();

  React.useEffect(() => {
    if (!ref.current) return;
    if (chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(ref.current, {
      type: 'bar',
      data: {
        labels,
        datasets: [{
          data,
          backgroundColor: data.map(v => v >= 0 ? '#4182b9' : '#e53e3e'),
          borderRadius: 3,
          borderSkipped: false,
        }],
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        animation: { duration: 400 },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#0d1f3c', titleColor: '#a8cae8', bodyColor: '#d2e4f5',
            borderColor: '#1e5a96', borderWidth: 1, cornerRadius: 8,
            callbacks: { label: ctx => `  Return: ${ctx.parsed.y.toFixed(1)}%` },
          },
        },
        scales: {
          x: { grid: { display: false }, ticks: { font: { size: 11 }, color: '#888' } },
          y: {
            grid: { color: '#f0f2f6' },
            ticks: { font: { size: 11 }, color: '#888', callback: v => v + '%' },
          },
        },
      },
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [JSON.stringify(labels), JSON.stringify(data)]);

  return <div style={{ height, position: 'relative' }}><canvas ref={ref} /></div>;
};

// ── Treemap ───────────────────────────────────────────────────────────────────
const Treemap = ({ items }) => {
  const [hovered, setHovered] = React.useState(null);
  if (!items || !items.length) return null;
  const sorted = [...items].sort((a, b) => b.weight - a.weight);

  return (
    <div style={{ display: 'flex', flexWrap: 'wrap', gap: 3, height: 280, borderRadius: 10, overflow: 'hidden' }}>
      {sorted.map(item => {
        const pct = (item.weight * 100).toFixed(1);
        const colorIdx = Math.min(Math.max(Math.floor(item.volTier ?? 2), 0), 5);
        const bg = PPL_BLUE6[colorIdx];
        const light = colorIdx <= 1;
        const tc  = light ? '#0a326e' : '#fff';
        const stc = light ? '#1e5a96' : 'rgba(255,255,255,0.75)';
        const isHov = hovered === item.ticker;

        return (
          <div
            key={item.ticker}
            onMouseEnter={() => setHovered(item.ticker)}
            onMouseLeave={() => setHovered(null)}
            style={{
              flexGrow: item.weight, flexBasis: `${item.weight * 100}%`,
              background: bg, display: 'flex', flexDirection: 'column',
              justifyContent: 'flex-end', padding: '8px 10px',
              cursor: 'default', filter: isHov ? 'brightness(1.12)' : 'none',
              transition: 'filter 0.15s', position: 'relative', minWidth: 40,
            }}
          >
            <div style={{ fontSize: 13, fontWeight: 700, color: tc, lineHeight: 1.2 }}>{item.ticker}</div>
            <div style={{ fontSize: 12, color: stc }}>{pct}%</div>
            {isHov && (
              <div style={{
                position: 'absolute', bottom: '100%', left: 0, zIndex: 20,
                background: '#0d1f3c', color: '#fff', borderRadius: 8,
                padding: '10px 14px', fontSize: 12, lineHeight: 1.6,
                whiteSpace: 'nowrap', boxShadow: '0 4px 16px rgba(0,0,0,0.25)',
                border: '1px solid #1e5a96',
              }}>
                <div style={{ fontWeight: 700, marginBottom: 5, color: '#a8cae8' }}>
                  {item.ticker} — {item.name}
                </div>
                <div>Weight: <strong>{pct}%</strong> · CAGR: <strong>{item.cagr?.toFixed(1)}%</strong></div>
                <div>Vol: {item.vol?.toFixed(1)}% · Max DD: <span style={{ color: '#fc8181' }}>{item.maxDD?.toFixed(1)}%</span></div>
                <div>Sharpe: {item.sharpe?.toFixed(2)}</div>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
};

// ── Section: Asset Screening ───────────────────────────────────────────────────
const CATEGORIES = ['All', 'TW_ETF', 'US_ETF', 'CRYPTO'];
const CAT_BADGE = { TW_ETF: 'blue', US_ETF: 'navy', CRYPTO: 'amber' };
const PER_PAGE = 8;

const AssetScreening = ({ t, watchlist, setWatchlist, setConfirmed, setPersona }) => {
  const [search, setSearch]   = useState('');
  const [cat, setCat]         = useState('All');
  const [cagrMin, setCagrMin] = useState(0);
  const [page, setPage]       = useState(0);

  const catLabel = { All: t.catAll, TW_ETF: t.catTW, US_ETF: t.catUS, CRYPTO: t.catCrypto };

  const filtered = useMemo(() => PPL_ASSETS.filter(a => {
    if (cat !== 'All' && a.category !== cat) return false;
    if (a.cagr < cagrMin) return false;
    if (search) {
      const q = search.toLowerCase();
      if (!a.ticker.toLowerCase().includes(q) && !a.name.toLowerCase().includes(q)) return false;
    }
    return true;
  }), [cat, cagrMin, search]);

  const pages   = Math.ceil(filtered.length / PER_PAGE);
  const visible = filtered.slice(page * PER_PAGE, (page + 1) * PER_PAGE);

  const toggle = useCallback((ticker) => {
    setConfirmed(false);
    setPersona(null);
    setWatchlist(w => w.includes(ticker) ? w.filter(t => t !== ticker) : [...w, ticker]);
  }, [setConfirmed, setPersona, setWatchlist]);

  const applyPersona = (name) => {
    const p = PPL_PERSONAS[name];
    setWatchlist(p.watchlist);
    setPersona(name);
    setConfirmed(true);
  };

  return (
    <div>
      <SectionTitle icon="🔍" title={t.screeningTitle} caption={t.screeningCaption} />

      {/* Filters */}
      <div style={{ display: 'flex', gap: 8, marginBottom: 14, flexWrap: 'wrap', alignItems: 'center' }}>
        <input value={search} onChange={e => { setSearch(e.target.value); setPage(0); }}
          placeholder={t.searchPlaceholder}
          style={{ padding: '7px 12px', borderRadius: 6, border: '1px solid #d0d7e2', fontSize: 13, fontFamily: 'inherit', width: 195, outline: 'none' }} />
        {CATEGORIES.map(c => (
          <button key={c} onClick={() => { setCat(c); setPage(0); }}
            style={{ padding: '6px 13px', borderRadius: 6, border: '1px solid', fontSize: 13, fontWeight: 600, cursor: 'pointer', fontFamily: 'inherit', transition: 'all 0.12s',
              borderColor: cat === c ? '#4182b9' : '#d0d7e2',
              background: cat === c ? '#4182b9' : '#fff',
              color: cat === c ? '#fff' : '#555',
            }}>
            {catLabel[c]}
          </button>
        ))}
        <select value={cagrMin} onChange={e => { setCagrMin(+e.target.value); setPage(0); }}
          style={{ padding: '7px 12px', borderRadius: 6, border: '1px solid #d0d7e2', fontSize: 13, fontFamily: 'inherit', background: '#fff', cursor: 'pointer' }}>
          {[0,5,10,15,20,30].map(v => <option key={v} value={v}>{t.cagrFilter} {v}%</option>)}
        </select>
        <div style={{ marginLeft: 'auto', fontSize: 13, color: '#888' }}>
          {t.selectedCount(watchlist.length, filtered.length)}
        </div>
      </div>

      {/* Table */}
      <div style={{ background: '#fff', border: '1px solid #e8edf3', borderRadius: 10, overflow: 'hidden', boxShadow: '0 1px 3px rgba(0,0,0,0.05)', marginBottom: 14 }}>
        <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
          <thead>
            <tr style={{ background: '#f7f9fc', borderBottom: '2px solid #e8edf3' }}>
              {['', t.colTicker, t.colName, t.colCategory, t.colSubcategory, t.colCagr, t.colVol, t.colMaxDD, t.colSharpe, t.colAum].map(h => (
                <th key={h} style={{ padding: '10px 12px', textAlign: 'left', fontWeight: 600, color: '#555', fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.04em', whiteSpace: 'nowrap' }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {visible.map((a, i) => {
              const inW = watchlist.includes(a.ticker);
              return (
                <tr key={a.ticker} onClick={() => toggle(a.ticker)}
                  style={{ background: inW ? '#eff5fb' : (i % 2 === 0 ? '#fff' : '#fafbfc'), borderBottom: '1px solid #f0f2f6', cursor: 'pointer', transition: 'background 0.1s' }}>
                  <td style={{ padding: '10px 12px' }}>
                    <div style={{ width: 22, height: 22, borderRadius: 6, border: `2px solid ${inW ? '#4182b9' : '#d0d7e2'}`, background: inW ? '#4182b9' : '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 13, color: '#fff', fontWeight: 700 }}>
                      {inW ? '✓' : '+'}
                    </div>
                  </td>
                  <td style={{ padding: '10px 12px', fontWeight: 700, color: '#0d1f3c', fontFamily: 'monospace', fontSize: 12 }}>{a.ticker}</td>
                  <td style={{ padding: '10px 12px', color: '#333', maxWidth: 180 }}>{a.name}</td>
                  <td style={{ padding: '10px 12px' }}><Badge label={catLabel[a.category]} variant={CAT_BADGE[a.category]} /></td>
                  <td style={{ padding: '10px 12px', color: '#555', fontSize: 12 }}>{a.subcategory}</td>
                  <td style={{ padding: '10px 12px', fontWeight: 600, color: a.cagr >= 10 ? '#1e5a96' : '#333' }}>{a.cagr.toFixed(1)}%</td>
                  <td style={{ padding: '10px 12px', color: '#555' }}>{a.vol.toFixed(1)}%</td>
                  <td style={{ padding: '10px 12px', color: '#e53e3e', fontWeight: 600 }}>{a.maxDD.toFixed(1)}%</td>
                  <td style={{ padding: '10px 12px', color: '#333' }}>{a.sharpe.toFixed(2)}</td>
                  <td style={{ padding: '10px 12px', color: '#888', fontSize: 12, whiteSpace: 'nowrap' }}>{a.aumNote}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
        {pages > 1 && (
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 5, padding: '10px', borderTop: '1px solid #f0f2f6' }}>
            {Array.from({ length: pages }, (_, i) => (
              <button key={i} onClick={() => setPage(i)}
                style={{ width: 28, height: 28, borderRadius: 6, border: '1px solid', cursor: 'pointer', fontFamily: 'inherit', fontSize: 13,
                  borderColor: page === i ? '#4182b9' : '#d0d7e2',
                  background: page === i ? '#4182b9' : '#fff',
                  color: page === i ? '#fff' : '#555',
                }}>
                {i + 1}
              </button>
            ))}
          </div>
        )}
      </div>

      {/* Persona quick-start */}
      <div style={{ background: '#f7f9fc', border: '1px solid #e8edf3', borderRadius: 10, padding: '16px 18px' }}>
        <div style={{ fontSize: 14, fontWeight: 600, color: '#0d1f3c', marginBottom: 12 }}>{t.personaPrompt}</div>
        <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap' }}>
          {Object.entries(PPL_PERSONAS).map(([name, p]) => (
            <div key={name}
              style={{ flex: 1, minWidth: 190, background: '#fff', border: '1px solid #e8edf3', borderRadius: 8, padding: '14px 16px', cursor: 'pointer', transition: 'box-shadow 0.15s' }}
              onClick={() => applyPersona(name)}
              onMouseEnter={e => e.currentTarget.style.boxShadow = '0 4px 12px rgba(65,130,185,0.15)'}
              onMouseLeave={e => e.currentTarget.style.boxShadow = 'none'}>
              <div style={{ fontWeight: 700, fontSize: 14, color: '#0d1f3c', marginBottom: 4 }}>{name}</div>
              <div style={{ fontSize: 12, color: '#6b727e', marginBottom: 10, lineHeight: 1.55 }}>
                {typeof p.description === 'object' ? (p.description.zh || p.description.en) : p.description}
              </div>
              <Btn small onClick={e => { e.stopPropagation(); applyPersona(name); }}>{t.applyPersona}</Btn>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
};

// ── Section: Correlation Analysis ──────────────────────────────────────────────
const CorrelationSection = ({ t, watchlist, confirmed, setConfirmed, persona }) => {
  if (!watchlist.length) return (
    <div>
      <SectionTitle icon="🔗" title={t.corrTitle} caption={t.corrCaption} />
      <InfoBanner>{t.corrAddFirst}</InfoBanner>
    </div>
  );

  const assetObjs = watchlist.map(tk => PPL_ASSETS.find(a => a.ticker === tk)).filter(Boolean);
  const hasCrypto = assetObjs.some(a => a.category === 'CRYPTO');
  const hasUS     = assetObjs.some(a => a.category === 'US_ETF');
  const hasTW     = assetObjs.some(a => a.category === 'TW_ETF');
  const diversity = [hasCrypto, hasUS, hasTW].filter(Boolean).length;
  const avgCorr   = Math.max(0.05, 0.75 - diversity * 0.12 - watchlist.length * 0.01).toFixed(2);
  const sp500Like = ['VOO','VTI','IVV','SPY'];
  const overlaps  = watchlist.filter(tk => sp500Like.includes(tk) && watchlist.some(tk2 => tk2 !== tk && sp500Like.includes(tk2)));
  const wellDiv   = +avgCorr < 0.5;

  const catLabel = { TW_ETF: t.catTW, US_ETF: t.catUS, CRYPTO: t.catCrypto };

  return (
    <div>
      <SectionTitle icon="🔗" title={t.corrTitle} caption={t.corrCaption} />
      {persona && <InfoBanner type="success">{t.corrPersonaApplied(persona)}</InfoBanner>}

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 12, marginBottom: 24 }}>
        <MetricCard label={t.corrSelectedAssets} value={watchlist.length} sub={t.corrInWatchlist} />
        <MetricCard label={t.corrOverlaps} value={overlaps.length}
          delta={overlaps.length > 0 ? t.corrOverlapHint : null} deltaPositive={false} />
        <MetricCard label={t.corrAvgCorr} value={avgCorr}
          delta={wellDiv ? t.corrWellDiv : t.corrSomeOverlap} deltaPositive={wellDiv} />

      ) : (
        <InfoBanner type="success">{t.confirmedBanner}</InfoBanner>

  );
};

// ── Section: Risk Allocation ───────────────────────────────────────────────────
const RISK_LEVELS = ['Low', 'Medium', 'High', 'Extreme High'];
const RISK_LABEL_KEY = { Low: 'riskLow', Medium: 'riskMed', High: 'riskHigh', 'Extreme High': 'riskXH' };
const RISK_VOL_MAP = { Low: 12, Medium: 20, High: 35, 'Extreme High': 65 };

const RiskAllocation = ({ t, watchlist, confirmed, riskLevel, setRiskLevel, allocation, setAllocation }) => {
  useEffect(() => {
    if (confirmed && watchlist.length) setAllocation(computeAllocation(watchlist, riskLevel));
  }, [watchlist, riskLevel, confirmed]);

  if (!confirmed || !watchlist.length) return (
    <div>
      <SectionTitle icon="⚖️" title={t.allocTitle} caption={t.allocCaption} />
      <InfoBanner>{t.allocLocked}</InfoBanner>
    </div>
  );

  const allVols = PPL_ASSETS.map(x => x.vol).sort((a, b) => a - b);

  const allItems = Object.entries(allocation).map(([ticker, weight]) => {
    const a = PPL_ASSETS.find(x => x.ticker === ticker);
    const volRank = allVols.indexOf(a?.vol ?? 0);
    const volTier = Math.min(Math.floor(volRank / 6), 5);
    return { ticker, weight, name: a?.name, cagr: a?.cagr, vol: a?.vol, maxDD: a?.maxDD, sharpe: a?.sharpe, volTier };
  }).filter(x => x.name);

  const wCagr = allItems.reduce((s, i) => s + i.weight * (i.cagr  || 0), 0);
  const wVol  = allItems.reduce((s, i) => s + i.weight * (i.vol   || 0), 0);
  const wDD   = allItems.reduce((s, i) => s + i.weight * (i.maxDD || 0), 0);
  const wSh   = allItems.reduce((s, i) => s + i.weight * (i.sharpe|| 0), 0);

  return (
    <div>
      <SectionTitle icon="⚖️" title={t.allocTitle} caption={t.allocCaption} />

      {/* Risk selector */}
      <div style={{ display: 'flex', gap: 8, marginBottom: 24, flexWrap: 'wrap' }}>
        {RISK_LEVELS.map(r => (
          <button key={r} onClick={() => setRiskLevel(r)}
            style={{ padding: '8px 18px', borderRadius: 8, border: '1px solid', fontSize: 13, fontWeight: 600, cursor: 'pointer', fontFamily: 'inherit', transition: 'all 0.15s',
              borderColor: riskLevel === r ? '#4182b9' : '#d0d7e2',
              background: riskLevel === r ? '#4182b9' : '#fff',
              color: riskLevel === r ? '#fff' : '#555',
            }}>
            {t[RISK_LABEL_KEY[r]]}
          </button>
        ))}
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4,1fr)', gap: 12, marginBottom: 24 }}>
        <MetricCard label={t.wCagr}   value={wCagr.toFixed(2) + '%'} />
        <MetricCard label={t.portVol} value={wVol.toFixed(1) + '%'} sub={`${t.target} ${RISK_VOL_MAP[riskLevel]}%`} />
        <MetricCard label={t.wMaxDD}  value={wDD.toFixed(1) + '%'} />
        <MetricCard label={t.wSharpe} value={wSh.toFixed(2)} />
      </div>

      <div style={{ fontWeight: 600, fontSize: 14, color: '#0d1f3c', marginBottom: 10 }}>{t.allocComposition}</div>
      <Treemap items={allItems} />

      {/* Weight grid */}
      <div style={{ marginTop: 16, display: 'grid', gridTemplateColumns: 'repeat(auto-fill,minmax(150px,1fr))', gap: 8 }}>
        {[...allItems].sort((a, b) => b.weight - a.weight).map(item => (
          <div key={item.ticker} style={{ background: '#f7f9fc', borderRadius: 8, padding: '10px 12px', border: '1px solid #e8edf3' }}>
            <div style={{ fontFamily: 'monospace', fontWeight: 700, color: '#0d1f3c', fontSize: 13 }}>{item.ticker}</div>
            <div style={{ fontSize: 11, color: '#888', marginTop: 2, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
              {item.name?.split(' ').slice(0, 3).join(' ')}
            </div>
            <div style={{ fontSize: 20, fontWeight: 700, color: '#4182b9', marginTop: 5 }}>
              {(item.weight * 100).toFixed(1)}%
            </div>
          </div>
        ))}
      </div>
    </div>
  );
};

const FireSection = ({ t, confirmed, btCagr }) => {

  useEffect(() => { if (btCagr) setCagrInput((btCagr * 100).toFixed(1)); }, [btCagr]);

  const fire = useMemo(() => calculateFIRE({
    cagr: cagrInput / 100, currentSavings: savings, monthlyContrib: contrib,

  const fmtNT = v => v >= 1e6 ? 'NT$' + (v / 1e6).toFixed(1) + 'M' : 'NT$' + Math.round(v).toLocaleString();

            </div>
          ))}

const SECTION_STYLE = { padding: '44px 48px', maxWidth: 1060 };

const App = () => {
  const [lang,       setLang]       = useState('en');
  const [activeNav,  setActiveNav]  = useState('intro');
  const [watchlist,  setWatchlist]  = useState([]);
  const [confirmed,  setConfirmed]  = useState(false);
  const [persona,    setPersona]    = useState(null);
  const [riskLevel,  setRiskLevel]  = useState('Medium');
  const [allocation, setAllocation] = useState({});
  const [initial,    setInitial]    = useState(300000);
  const [monthly,    setMonthly]    = useState(15000);

  const t = T[lang] || T.en;

  const btCagr = useMemo(() => {
    if (!confirmed || !Object.keys(allocation).length) return null;
    return generateBacktest(allocation, initial, monthly).cagr;
  }, [allocation, confirmed, initial, monthly]);

  const sectionProps = { t, lang, watchlist, setWatchlist, confirmed, setConfirmed, persona, setPersona, riskLevel, setRiskLevel, allocation, setAllocation, initial, setInitial, monthly, setMonthly, btCagr };

  const renderSection = () => {
    switch (activeNav) {
      case 'intro':       return <div style={SECTION_STYLE}><IntroSection {...sectionProps} /></div>;
      case 'screening':   return <div style={SECTION_STYLE}><AssetScreening {...sectionProps} /></div>;
      case 'correlation': return <div style={SECTION_STYLE}><CorrelationSection {...sectionProps} /></div>;
      case 'allocation':  return <div style={SECTION_STYLE}><RiskAllocation {...sectionProps} /></div>;
      case 'backtest':    return <div style={SECTION_STYLE}><BacktestSection {...sectionProps} /></div>;
      case 'fire':        return <div style={SECTION_STYLE}><FireSection {...sectionProps} /></div>;
      case 'summary':     return <div style={SECTION_STYLE}><SummarySection {...sectionProps} /></div>;
      default:            return null;
    }
  };

  return (
    <div style={{ display: 'flex', minHeight: '100vh', fontFamily: "'Source Sans 3',system-ui,sans-serif", background: '#f7f9fc' }}>
      <Sidebar active={activeNav} onNav={setActiveNav} lang={lang} setLang={setLang} t={t} confirmed={confirmed} />
      <main style={{ flex: 1, overflowY: 'auto', minWidth: 0 }}>
        {renderSection()}
      </main>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

  <!-- Hide loading screen once React mounts -->
  <script>
    (function waitForRoot() {
      const observer = new MutationObserver(() => {
        const root = document.getElementById('root');
        if (root && root.children.length > 0) {
          const loader = document.getElementById('loading');
          if (loader) loader.style.display = 'none';
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById('root'), { childList: true });
    })();
  </script>

</body>
</html>
