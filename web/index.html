    blue:  ['#d2e4f5','#0a326e'], green: ['#d4f0e0','#0e5a2a'],

  const variants = {

    danger:    { bg:'#e53e3e', color:'#fff',   border:'#e53e3e',  hbg:'#c0392b', hborder:'#c0392b' },
  };
  const v = variants[variant] || variants.primary;
  const [hover, setHover] = React.useState(false);
  return (
    <button onClick={onClick} disabled={disabled}

        fontSize:small?13:14, fontWeight:600,
        cursor:disabled?'not-allowed':'pointer',

        color:disabled?'#aaa':v.color,
        transition:'all 0.15s', fontFamily:'inherit' }}>
      {children}

};

const ChartLine = ({ labels, datasets, height=260, yFmt, events=[], extraInfo=[], hLines=[], lang='en' }) => {
  const ref = React.useRef();
  const chartRef = React.useRef();

  React.useEffect(() => {
    if (!ref.current) return;
    if (chartRef.current) chartRef.current.destroy();

    const EV_COLORS = {
      red:    { bg:'rgba(229,62,62,0.09)',  border:'rgba(229,62,62,0.30)',  text:'#c53030' },
      orange: { bg:'rgba(214,105,0,0.09)',  border:'rgba(214,105,0,0.30)',  text:'#a05000' },
      purple: { bg:'rgba(107,57,196,0.09)', border:'rgba(107,57,196,0.30)', text:'#6b39c4' },
    };
    const annotations = {};

    events.forEach((ev, i) => {
      const ec = EV_COLORS[ev.color] || EV_COLORS.red;
      const evLabel = lang==='zh' ? (ev.labelZh||ev.label) : ev.label;
      annotations[`evBox${i}`] = { type:'box', xMin:ev.xMin, xMax:ev.xMax,
        backgroundColor:ec.bg, borderColor:ec.border, borderWidth:1 };
      annotations[`evLine${i}`] = { type:'line', xMin:ev.xMin, xMax:ev.xMin,
        borderColor:ec.border, borderWidth:1.5, borderDash:[3,3],
        label:{ display:true, content:evLabel, position:'start', color:ec.text,
          backgroundColor:'rgba(255,255,255,0.90)',
          font:{size:10,weight:'600'}, padding:{x:5,y:3}, borderRadius:4, yAdjust:6, xAdjust:4 } };
    });

    hLines.forEach((hl, i) => {
      annotations[`hLine${i}`] = { type:'line', yMin:hl.value, yMax:hl.value,
        borderColor:hl.color||'rgba(150,150,150,0.35)', borderWidth:1, borderDash:[5,4],
        label:{ display:true, content:hl.label, position:'100%',
          color:hl.color||'#999', backgroundColor:'transparent',
          font:{size:10,weight:'600'}, xAdjust:-4 } };
    });

    chartRef.current = new Chart(ref.current, {
      type:'line', data:{ labels, datasets },
      options:{
        responsive:true, maintainAspectRatio:false, animation:{duration:400},
        interaction:{mode:'index',intersect:false},
        plugins:{
          legend:{ position:'top', labels:{boxWidth:10,font:{size:12},usePointStyle:true,pointStyleWidth:10} },
          tooltip:{
            backgroundColor:'#0d1f3c', titleColor:'#a8cae8', bodyColor:'#d2e4f5',
            borderColor:'#1e5a96', borderWidth:1, padding:{x:14,y:12}, cornerRadius:8,
            titleFont:{size:12,weight:'700'}, bodyFont:{size:12},
            callbacks:{
              title:items=>'📅 '+items[0].label,
              label:ctx=>{
                const v=ctx.parsed.y;
                const fmt=yFmt?yFmt(v,ctx.dataset.label):v.toLocaleString();
                return `  ${ctx.dataset.label}: ${fmt}`;
              },
              afterBody:items=>{
                const idx=items[0].dataIndex;
                if (extraInfo.length && extraInfo[idx]!==undefined) {
                  const dd=extraInfo[idx];
                  const bar=dd<-30?'🔴':dd<-15?'🟡':'🟢';
                  return ['',`  ${bar} Drawdown: ${dd.toFixed(1)}%`];
                }
                return [];
              },
            },
          },
          annotation:{annotations},
        },
        scales:{
          x:{ grid:{display:false}, ticks:{maxTicksLimit:10,font:{size:11},color:'#888'} },
          y:{ grid:{color:'#f0f2f6'}, ticks:{font:{size:11},color:'#888',
            callback:v=>yFmt?yFmt(v):v.toLocaleString()} },
        },
      },
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [JSON.stringify(labels),JSON.stringify(datasets),JSON.stringify(events),
      JSON.stringify(hLines),JSON.stringify(extraInfo),lang]);

  return <div style={{ height, position:'relative' }}><canvas ref={ref} /></div>;
};

const ChartBar = ({ labels, data, height=220 }) => {
  const ref = React.useRef();
  const chartRef = React.useRef();
  React.useEffect(() => {
    if (!ref.current) return;
    if (chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(ref.current, {
      type:'bar',
      data:{ labels, datasets:[{ data, backgroundColor:data.map(v=>v>=0?'#4182b9':'#e53e3e'), borderRadius:3, borderSkipped:false }] },
      options:{
        responsive:true, maintainAspectRatio:false, animation:{duration:400},
        plugins:{ legend:{display:false},
          tooltip:{ backgroundColor:'#0d1f3c', titleColor:'#a8cae8', bodyColor:'#d2e4f5',
            borderColor:'#1e5a96', borderWidth:1, cornerRadius:8,
            callbacks:{label:ctx=>`  Return: ${ctx.parsed.y.toFixed(1)}%`} } },
        scales:{
          x:{grid:{display:false},ticks:{font:{size:11},color:'#888'}},
          y:{grid:{color:'#f0f2f6'},ticks:{font:{size:11},color:'#888',callback:v=>v+'%'}},
        },
      },
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [JSON.stringify(labels),JSON.stringify(data)]);
  return <div style={{ height, position:'relative' }}><canvas ref={ref} /></div>;
};

// ── Treemap — squarified layout (more square tiles) ──────────────────────────
function _tmWorstRatio(row, edge) {
  if (!row.length) return Infinity;
  const rowArea = row.reduce((s, n) => s + n.area, 0);
  const strip   = rowArea / edge;
  let worst = 0;
  for (const n of row) {
    const other = n.area / strip;
    const r = Math.max(strip / other, other / strip);
    if (r > worst) worst = r;
  }
  return worst;
}

function _tmLayoutStrip(row, x, y, w, h, result) {
  const rowArea = row.reduce((s, n) => s + n.area, 0);
  let pos = (w >= h) ? x : y;
  for (const n of row) {
    const frac = n.area / rowArea;
    if (w >= h) { result.push({ ...n, x: pos, y, w: frac * w, h }); pos += frac * w; }
    else         { result.push({ ...n, x, y: pos, w, h: frac * h }); pos += frac * h; }
  }
}

function treemapLayout(items, x, y, w, h) {
  if (!items.length) return [];
  const total  = items.reduce((s, i) => s + i.weight, 0);
  const nodes  = items.map(i => ({ ...i, area: (i.weight / total) * w * h }));
  const result = [];
  let cx = x, cy = y, cw = w, ch = h, row = [];

  for (const node of nodes) {
    const edge    = Math.min(cw, ch);
    const testRow = [...row, node];
    if (row.length === 0 || _tmWorstRatio(testRow, edge) <= _tmWorstRatio(row, edge)) {
      row.push(node);
    } else {
      const rowArea = row.reduce((s, n) => s + n.area, 0);
      if (cw >= ch) { const rw = rowArea / ch; _tmLayoutStrip(row, cx, cy, rw, ch, result); cx += rw; cw -= rw; }
      else           { const rh = rowArea / cw; _tmLayoutStrip(row, cx, cy, cw, rh, result); cy += rh; ch -= rh; }
      row = [node];
    }
  }
  if (row.length) _tmLayoutStrip(row, cx, cy, cw, ch, result);
  return result;
}

const Treemap = ({ items, onSelect, selectedTicker }) => {
  if (!items || !items.length) return null;
  const sorted = [...items].sort((a, b) => b.weight - a.weight);
  const tiles  = treemapLayout(sorted, 0, 0, 1, 1);

  return (
    <div style={{ position:'relative', height:280, borderRadius:10, overflow:'hidden' }}>
      {tiles.map(tile => {
        const colorIdx = Math.min(Math.max(Math.floor(tile.volTier ?? 2), 0), 5);
        const bg  = PPL_BLUE6[colorIdx];
        const light = colorIdx <= 1;
        const tc  = light ? '#0a326e' : '#fff';
        const stc = light ? '#1e5a96' : 'rgba(255,255,255,0.75)';
        const isSel  = selectedTicker === tile.ticker;
        const pct    = (tile.weight * 100).toFixed(1);
        const showLabel = tile.w > 0.07;
        const showPct   = tile.w > 0.10 && tile.h > 0.18;

        return (
          <div key={tile.ticker}
            onClick={() => onSelect(isSel ? null : tile.ticker)}
            title={`${tile.ticker} — ${tile.name}  |  ${pct}%  CAGR ${tile.cagr?.toFixed(1)}%  Vol ${tile.vol?.toFixed(1)}%`}
            style={{
              position:'absolute',
              left:`${tile.x*100}%`, top:`${tile.y*100}%`,
              width:`${tile.w*100}%`, height:`${tile.h*100}%`,
              background:bg,
              border:isSel ? '2px solid rgba(255,255,255,0.9)' : '1px solid rgba(255,255,255,0.18)',
              boxSizing:'border-box',
              display:'flex', flexDirection:'column', justifyContent:'flex-end',
              padding:'5px 7px', cursor:'pointer', overflow:'hidden',
              filter:isSel ? 'brightness(1.14)' : 'none',
              transition:'filter 0.15s, border 0.1s',
            }}>
            {showLabel && <div style={{ fontSize:12, fontWeight:700, color:tc, lineHeight:1.2, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{tile.ticker}</div>}
            {showPct   && <div style={{ fontSize:11, color:stc }}>{pct}%</div>}
          </div>
        );
      })}
    </div>
  );
};

// ── AI insights (rule-based, no API key needed) ───────────────────────────────
function generatePortfolioInsights(allocation, riskLevel, btCagr, lang) {
  const allItems = Object.entries(allocation).map(([tk, w]) => {
    const a = PPL_ASSETS.find(x => x.ticker === tk);
    return a ? { ticker:tk, weight:w, ...a } : null;
  }).filter(Boolean).sort((a, b) => b.weight - a.weight);
  if (!allItems.length) return [];

  const wMaxDD   = allItems.reduce((s, i) => s + i.weight * (i.maxDD || 0), 0);
  const cryptoW  = allItems.filter(i => i.category === 'CRYPTO').reduce((s, i) => s + i.weight, 0);
  const bondCats = ['US Total Bond','Intermediate US Treasury','Bond'];
  const bondW    = allItems.filter(i => bondCats.includes(i.subcategory)).reduce((s, i) => s + i.weight, 0);
  const top      = allItems[0];
  const cagrPct  = btCagr ? (btCagr * 100).toFixed(1) : '—';
  const zh = lang === 'zh';
  const ins = [];

  if (top && top.weight > 0.30) {
    ins.push(zh
      ? `📊 ${top.ticker} 佔比達 ${(top.weight*100).toFixed(0)}%，集中度偏高。建議加入 1–2 個低相關資產，將最大單一持倉壓低至 30% 以內，降低個別資產風險對整體的衝擊。`
      : `📊 ${top.ticker} is ${(top.weight*100).toFixed(0)}% of the portfolio — high concentration. Adding 1–2 low-correlation assets to keep the largest single position below 30% would reduce idiosyncratic risk.`);
  }

  if (cryptoW > 0.20) {
    ins.push(zh
      ? `⚠️ 加密貨幣合計佔 ${(cryptoW*100).toFixed(0)}%，極端行情下可能數週內跌超 50%。請確認即使帳面虧損過半，你在財務和心理上仍能持有而不被迫賣出。`
      : `⚠️ Crypto totals ${(cryptoW*100).toFixed(0)}% — in extreme events it can drop 50%+ within weeks. Confirm you can hold without being forced to sell even if paper losses exceed half your crypto value.`);
  } else if (cryptoW > 0) {
    ins.push(zh
      ? `✅ 加密貨幣佔比 ${(cryptoW*100).toFixed(0)}%，屬合理的衛星倉位：有助提升長期 CAGR，同時將極端風險侷限在組合的一小部分。建議設下再平衡上限（如 15%），避免牛市中佔比過度膨脹。`
      : `✅ Crypto at ${(cryptoW*100).toFixed(0)}% is a reasonable satellite — boosts long-term CAGR while capping extreme risk. Set a rebalancing ceiling (e.g. 15%) so bull-run drift doesn't let it dominate.`);
  }

  if (bondW > 0.25) {
    ins.push(zh
      ? `🛡️ 債券配比 ${(bondW*100).toFixed(0)}%，有效緩衝市場震盪，但會壓低長期報酬。以加權 CAGR ${cagrPct}% 計算，扣除通膨後的實質報酬可能低於預期——若距退休尚遠，建議定期檢視是否可降低債券比重。`
      : `🛡️ Bond weight at ${(bondW*100).toFixed(0)}% absorbs volatility effectively but compresses long-term returns. At a ${cagrPct}% weighted CAGR, real returns after inflation may be modest. If retirement is distant, review whether reducing bond weight is appropriate.`);
  }

  if (Math.abs(wMaxDD) > 35) {
    ins.push(zh
      ? `📉 加權最大回撤估計 ~${Math.abs(wMaxDD).toFixed(0)}%。建議現在就寫下「無論跌多深都不賣」的書面承諾，並設好再平衡提醒——研究顯示，在市場恐慌時提前做好計畫的投資人，長期報酬顯著優於臨場決策者。`
      : `📉 Estimated max drawdown ~${Math.abs(wMaxDD).toFixed(0)}%. Write a "no-sell" commitment now and set rebalance reminders. Research shows investors with pre-committed plans significantly outperform those who decide in the moment of panic.`);
  }

  ins.push(zh
    ? `🔄 建議每季執行再平衡：當任一持倉偏離目標比例超過 5% 時，賣出超配資產、買進低配資產。這樣能系統性地做到「高賣低買」，並長期維持與你風險承受度一致的曝險結構。`
    : `🔄 Rebalance quarterly: when any holding drifts more than 5% from target, sell the over-weight and buy the under-weight. This enforces systematic buy-low-sell-high and keeps risk exposure aligned with your tolerance over time.`);

  return ins.slice(0, 4);
}

const CATEGORIES = ['All','TW_ETF','US_ETF','CRYPTO'];
const CAT_BADGE  = { TW_ETF:'blue', US_ETF:'navy', CRYPTO:'amber' };
const PER_PAGE   = 8;
const SORT_COLS  = [
  { label:'',       key:null },
  { label:'ticker', key:'ticker' },
  { label:'name',   key:'name'   },
  { label:'cat',    key:null     },
  { label:'sub',    key:null     },
  { label:'cagr',   key:'cagr'   },
  { label:'vol',    key:'vol'    },
  { label:'maxDD',  key:'maxDD'  },
  { label:'sharpe', key:'sharpe' },
  { label:'aum',    key:null     },
];

const AssetScreening = ({ t, lang, watchlist, setWatchlist, setConfirmed, setPersona, onReviewPortfolio }) => {
  const [search,  setSearch]  = useState('');
  const [cat,     setCat]     = useState('All');
  const [cagrMin, setCagrMin] = useState(0);
  const [page,    setPage]    = useState(0);
  const [sortKey, setSortKey] = useState(null);
  const [sortDir, setSortDir] = useState('desc');
  const catLabel = { All:t.catAll, TW_ETF:t.catTW, US_ETF:t.catUS, CRYPTO:t.catCrypto };

  const colLabels = ['', t.colTicker, t.colName, t.colCategory, t.colSubcategory, t.colCagr, t.colVol, t.colMaxDD, t.colSharpe, t.colAum];

  const filtered = useMemo(() => PPL_ASSETS.filter(a => {
    if (cat !== 'All' && a.category !== cat) return false;
    if (a.cagr < cagrMin) return false;
    if (search) {
      const q = search.toLowerCase();
      if (!a.ticker.toLowerCase().includes(q) && !a.name.toLowerCase().includes(q)) return false;
    }
    return true;
  }), [cat, cagrMin, search]);

  const sortedFiltered = useMemo(() => {
    if (!sortKey) return filtered;
    return [...filtered].sort((a, b) => {
      const av = a[sortKey], bv = b[sortKey];
      if (typeof av === 'string') return sortDir === 'asc' ? av.localeCompare(bv) : bv.localeCompare(av);
      return sortDir === 'asc' ? av - bv : bv - av;
    });
  }, [filtered, sortKey, sortDir]);

  const pages   = Math.ceil(sortedFiltered.length / PER_PAGE);
  const visible = sortedFiltered.slice(page * PER_PAGE, (page+1) * PER_PAGE);

  const toggle = useCallback((ticker) => {
    setConfirmed(false); setPersona(null);
    setWatchlist(w => w.includes(ticker) ? w.filter(x => x !== ticker) : [...w, ticker]);
  }, [setConfirmed, setPersona, setWatchlist]);

  const selectAll = useCallback(() => {
    setConfirmed(false); setPersona(null);
    setWatchlist(w => { const s = new Set(w); filtered.forEach(a => s.add(a.ticker)); return Array.from(s); });
  }, [filtered, setConfirmed, setPersona, setWatchlist]);

  const deselectAll = useCallback(() => {
    setConfirmed(false); setPersona(null);
    const tks = new Set(filtered.map(a => a.ticker));
    setWatchlist(w => w.filter(tk => !tks.has(tk)));
  }, [filtered, setConfirmed, setPersona, setWatchlist]);

  const applyPersona = (name) => {
    const p = PPL_PERSONAS[name];
    setWatchlist(p.watchlist); setPersona(name); setConfirmed(true);
  };

  const onSortCol = (key) => {
    if (!key) return;
    if (sortKey === key) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
    else { setSortKey(key); setSortDir('desc'); }
    setPage(0);
  };

  return (
    <div>
      <SectionTitle icon="🔍" title={t.screeningTitle} caption={t.screeningCaption} />

      <div style={{ display:'flex', gap:8, marginBottom:14, flexWrap:'wrap', alignItems:'center' }}>
        <input value={search} onChange={e => { setSearch(e.target.value); setPage(0); }}
          placeholder={t.searchPlaceholder}
          style={{ padding:'7px 12px', borderRadius:6, border:'1px solid #d0d7e2', fontSize:13, fontFamily:'inherit', width:195, outline:'none' }} />
        {CATEGORIES.map(c => (
          <button key={c} onClick={() => { setCat(c); setPage(0); }}
            style={{ padding:'6px 13px', borderRadius:6, border:'1px solid', fontSize:13, fontWeight:600, cursor:'pointer', fontFamily:'inherit', transition:'all 0.12s',
              borderColor:cat===c?'#4182b9':'#d0d7e2', background:cat===c?'#4182b9':'#fff', color:cat===c?'#fff':'#555' }}>
            {catLabel[c]}
          </button>
        ))}
        <select value={cagrMin} onChange={e => { setCagrMin(+e.target.value); setPage(0); }}
          style={{ padding:'7px 12px', borderRadius:6, border:'1px solid #d0d7e2', fontSize:13, fontFamily:'inherit', background:'#fff', cursor:'pointer' }}>
          {[0,5,10,15,20,30].map(v => <option key={v} value={v}>{t.cagrFilter} {v}%</option>)}
        </select>
        <Btn small variant="ghost" onClick={selectAll}>{t.selectAll}</Btn>
        <Btn small variant="ghost" onClick={deselectAll}>{t.deselectAll}</Btn>
        <div style={{ marginLeft:'auto', fontSize:13, color:'#888' }}>{t.selectedCount(watchlist.length, filtered.length)}</div>
      </div>

      <div style={{ background:'#fff', border:'1px solid #e8edf3', borderRadius:10, overflow:'hidden', boxShadow:'0 1px 3px rgba(0,0,0,0.05)', marginBottom:14 }}>
        <table style={{ width:'100%', borderCollapse:'collapse', fontSize:13 }}>
          <thead>
            <tr style={{ background:'#f7f9fc', borderBottom:'2px solid #e8edf3' }}>
              {SORT_COLS.map((col, i) => {
                const label = colLabels[i];
                const isActive = col.key !== null && sortKey === col.key;
                return (
                  <th key={i} onClick={() => onSortCol(col.key)}
                    style={{ padding:'10px 12px', textAlign:'left', fontWeight:600, color:isActive?'#1e5a96':'#555',
                      fontSize:11, textTransform:'uppercase', letterSpacing:'0.04em', whiteSpace:'nowrap',
                      cursor:col.key?'pointer':'default', userSelect:'none' }}>
                    {label}
                    {col.key && <span style={{ marginLeft:4, color:isActive?'#4182b9':'#ccc' }}>{isActive?(sortDir==='asc'?'▲':'▼'):'↕'}</span>}
                  </th>
                );
              })}
            </tr>
          </thead>
          <tbody>
            {visible.map((a, i) => {
              const inW = watchlist.includes(a.ticker);
              return (
                <tr key={a.ticker} onClick={() => toggle(a.ticker)}
                  style={{ background:inW?'#eff5fb':(i%2===0?'#fff':'#fafbfc'), borderBottom:'1px solid #f0f2f6', cursor:'pointer', transition:'background 0.1s' }}>
                  <td style={{ padding:'10px 12px' }}>
                    <div style={{ width:22, height:22, borderRadius:6, border:`2px solid ${inW?'#4182b9':'#d0d7e2'}`, background:inW?'#4182b9':'#fff', display:'flex', alignItems:'center', justifyContent:'center', fontSize:13, color:'#fff', fontWeight:700 }}>
                      {inW ? '✓' : '+'}
                    </div>
                  </td>

];

const CorrelationSection = ({ t, lang, watchlist, confirmed, setConfirmed, persona }) => {
  if (!watchlist.length) return (
    <div>
      <SectionTitle icon="🔗" title={t.corrTitle} caption={t.corrCaption} />
      <InfoBanner>{t.corrAddFirst}</InfoBanner>
    </div>
  );
  const assetObjs    = watchlist.map(tk => PPL_ASSETS.find(a => a.ticker===tk)).filter(Boolean);
  const hasCrypto    = assetObjs.some(a => a.category==='CRYPTO');
  const hasUS        = assetObjs.some(a => a.category==='US_ETF');
  const hasTW        = assetObjs.some(a => a.category==='TW_ETF');
  const diversity    = [hasCrypto,hasUS,hasTW].filter(Boolean).length;
  const avgCorr      = Math.max(0.05, 0.75 - diversity*0.12 - watchlist.length*0.01).toFixed(2);
  const sp500Like    = ['VOO','VTI','IVV','SPY'];
  const overlaps     = watchlist.filter(tk => sp500Like.includes(tk) && watchlist.some(tk2 => tk2!==tk && sp500Like.includes(tk2)));
  const wellDiv      = +avgCorr < 0.5;
  const catLabel     = { TW_ETF:t.catTW, US_ETF:t.catUS, CRYPTO:t.catCrypto };
  const zh           = lang === 'zh';
  const highCorrPairs = CORR_PAIRS.filter(p => watchlist.includes(p.a) && watchlist.includes(p.b));

  return (
    <div>
      <SectionTitle icon="🔗" title={t.corrTitle} caption={t.corrCaption} />
      {persona && <InfoBanner type="success">{t.corrPersonaApplied(persona)}</InfoBanner>}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:12, marginBottom:24 }}>
        <MetricCard label={t.corrSelectedAssets} value={watchlist.length} sub={t.corrInWatchlist} />
        <MetricCard label={t.corrOverlaps} value={overlaps.length}
          delta={overlaps.length>0?t.corrOverlapHint:null} deltaPositive={false} />
        <MetricCard label={t.corrAvgCorr} value={avgCorr}
          delta={wellDiv?t.corrWellDiv:t.corrSomeOverlap} deltaPositive={wellDiv} />
      </div>

      {highCorrPairs.length > 0 && (
        <div style={{ background:'#fff8f0', border:'1px solid #e8a000', borderRadius:10, padding:'16px 20px', marginBottom:24 }}>
          <div style={{ fontWeight:700, fontSize:14, color:'#7a4a00', marginBottom:6 }}>⚠️ {t.corrHighCorrTitle}</div>
          <div style={{ fontSize:13, color:'#7a4a00', marginBottom:12, lineHeight:1.6 }}>{t.corrHighCorrCaption}</div>
          <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
            {highCorrPairs.map((p, i) => (
              <div key={i} style={{ display:'flex', alignItems:'center', gap:10, background:'rgba(255,255,255,0.7)', borderRadius:8, padding:'8px 12px', flexWrap:'wrap' }}>
                <span style={{ fontFamily:'monospace', fontWeight:700, color:'#0d1f3c', fontSize:13 }}>{p.a}</span>
                <span style={{ color:'#aaa', fontSize:12 }}>+</span>
                <span style={{ fontFamily:'monospace', fontWeight:700, color:'#0d1f3c', fontSize:13 }}>{p.b}</span>
                <span style={{ color:'#888', fontSize:12, flex:1 }}>— {zh ? p.zh : p.en}</span>
                <span style={{ fontSize:11, fontWeight:600, color: p.sev==='high'?'#c0392b':'#a05000',
                  background: p.sev==='high'?'rgba(229,62,62,0.10)':'rgba(214,105,0,0.12)',
                  padding:'2px 8px', borderRadius:9999 }}>
                  {p.sev === 'high' ? (zh?'🔴 近乎相同':'🔴 Near-identical') : (zh?'🟡 高度重疊':'🟡 High overlap')}
                </span>
              </div>
            ))}
          </div>
          <div style={{ fontSize:12, color:'#a05000', marginTop:10 }}>💡 {t.corrKeepOne}</div>
        </div>
      )}

      <div style={{ display:'flex', flexWrap:'wrap', gap:8, marginBottom:24 }}>
        {assetObjs.map(a => (
          <div key={a.ticker} style={{ background:'#eff5fb', border:'1px solid #a8cae8', borderRadius:8, padding:'6px 12px', fontSize:13 }}>
            <span style={{ fontWeight:700, color:'#0a326e', fontFamily:'monospace' }}>{a.ticker}</span>
            <span style={{ color:'#888', marginLeft:6, fontSize:12 }}>{catLabel[a.category]}</span>
            <span style={{ color:'#4182b9', marginLeft:8 }}>{a.cagr.toFixed(1)}% CAGR</span>
          </div>
        ))}
      </div>
      {!confirmed ? (
        <div style={{ display:'flex', alignItems:'center', gap:16 }}>
          <Btn onClick={() => setConfirmed(true)}>{t.confirmBtn(watchlist.length)}</Btn>
          <span style={{ fontSize:13, color:'#888' }}>{t.confirmUnlocks}</span>
        </div>
      ) : (
        <InfoBanner type="success">{t.confirmedBanner}</InfoBanner>
      )}
    </div>
  );
};

// ── Section: Risk Allocation ──────────────────────────────────────────────────
const RISK_LEVELS    = ['Low','Medium','High','Extreme High'];
const RISK_LABEL_KEY = { Low:'riskLow', Medium:'riskMed', High:'riskHigh', 'Extreme High':'riskXH' };
const RISK_VOL_MAP   = { Low:12, Medium:20, High:35, 'Extreme High':65 };

const RiskAllocation = ({ t, watchlist, confirmed, riskLevel, setRiskLevel, allocation, setAllocation }) => {
  const [selectedTicker, setSelectedTicker] = useState(null);

  useEffect(() => {
    if (confirmed && watchlist.length) setAllocation(computeAllocation(watchlist, riskLevel));
  }, [watchlist, riskLevel, confirmed]);

  if (!confirmed || !watchlist.length) return (
    <div>
      <SectionTitle icon="⚖️" title={t.allocTitle} caption={t.allocCaption} />
      <InfoBanner>{t.allocLocked}</InfoBanner>
    </div>
  );

  const allVols = PPL_ASSETS.map(x => x.vol).sort((a,b) => a-b);
  const allItems = Object.entries(allocation).map(([ticker, weight]) => {
    const a = PPL_ASSETS.find(x => x.ticker===ticker);
    const volRank = allVols.indexOf(a?.vol ?? 0);
    const volTier = Math.min(Math.floor(volRank/6), 5);
    return { ticker, weight, name:a?.name, cagr:a?.cagr, vol:a?.vol, maxDD:a?.maxDD, sharpe:a?.sharpe, volTier };
  }).filter(x => x.name);

  const wCagr = allItems.reduce((s,i) => s + i.weight*(i.cagr ||0), 0);
  const wVol  = allItems.reduce((s,i) => s + i.weight*(i.vol  ||0), 0);
  const wDD   = allItems.reduce((s,i) => s + i.weight*(i.maxDD||0), 0);
  const wSh   = allItems.reduce((s,i) => s + i.weight*(i.sharpe||0), 0);

  const selectedItem = allItems.find(i => i.ticker === selectedTicker);

  return (
    <div>
      <SectionTitle icon="⚖️" title={t.allocTitle} caption={t.allocCaption} />

      <div style={{ display:'flex', gap:8, marginBottom:24, flexWrap:'wrap' }}>
        {RISK_LEVELS.map(r => (
          <button key={r} onClick={() => setRiskLevel(r)}
            style={{ padding:'8px 18px', borderRadius:8, border:'1px solid', fontSize:13, fontWeight:600, cursor:'pointer', fontFamily:'inherit', transition:'all 0.15s',
              borderColor:riskLevel===r?'#4182b9':'#d0d7e2', background:riskLevel===r?'#4182b9':'#fff', color:riskLevel===r?'#fff':'#555' }}>
            {t[RISK_LABEL_KEY[r]]}
          </button>
        ))}
      </div>

      <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:12, marginBottom:24 }}>
        <MetricCard label={t.wCagr}   value={wCagr.toFixed(2)+'%'} />
        <MetricCard label={t.portVol} value={wVol.toFixed(1)+'%'} sub={`${t.target} ${RISK_VOL_MAP[riskLevel]}%`} />
        <MetricCard label={t.wMaxDD}  value={wDD.toFixed(1)+'%'} />
        <MetricCard label={t.wSharpe} value={wSh.toFixed(2)} />
      </div>

      <div style={{ display:'flex', alignItems:'baseline', gap:10, marginBottom:8 }}>
        <div style={{ fontWeight:600, fontSize:14, color:'#0d1f3c' }}>{t.allocComposition}</div>
        <div style={{ fontSize:12, color:'#888' }}>{t.allocClickHint}</div>
      </div>
      <Treemap items={allItems} onSelect={setSelectedTicker} selectedTicker={selectedTicker} />

      {selectedItem && (
        <div style={{ marginTop:10, background:'#fff', border:'1px solid #a8cae8', borderRadius:10, padding:'16px 20px', boxShadow:'0 2px 8px rgba(65,130,185,0.12)' }}>
          <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:14 }}>
            <span style={{ fontFamily:'monospace', fontWeight:700, fontSize:16, color:'#0d1f3c' }}>{selectedItem.ticker}</span>
            <span style={{ fontSize:14, color:'#555', flex:1 }}>{selectedItem.name}</span>
            <button onClick={() => setSelectedTicker(null)}
              style={{ background:'none', border:'none', cursor:'pointer', fontSize:14, color:'#888', fontFamily:'inherit', fontWeight:600 }}>
              ✕ {t.detailClose}
            </button>
          </div>
          <div style={{ display:'grid', gridTemplateColumns:'repeat(5,1fr)', gap:10 }}>
            <MetricCard label={t.detailWeight} value={`${(selectedItem.weight*100).toFixed(1)}%`} />
            <MetricCard label={t.colCagr}      value={`${selectedItem.cagr?.toFixed(1)}%`} />
            <MetricCard label={t.colVol}       value={`${selectedItem.vol?.toFixed(1)}%`} />
            <MetricCard label={t.colMaxDD}     value={`${selectedItem.maxDD?.toFixed(1)}%`} />
            <MetricCard label={t.colSharpe}    value={selectedItem.sharpe?.toFixed(2)} />
          </div>
        </div>
      )}

    </div>
  );
};

const TIME_RANGES = [
  { key:'1y',  label:'1Y',  from:'2024-04' },
  { key:'3y',  label:'3Y',  from:'2022-04' },
  { key:'5y',  label:'5Y',  from:'2020-04' },

  red:    { bg:'rgba(229,62,62,0.12)',  color:'#c53030' },
  orange: { bg:'rgba(214,105,0,0.12)',  color:'#a05000' },
  purple: { bg:'rgba(107,57,196,0.12)', color:'#6b39c4' },
};

const BacktestSection = ({ t, lang, allocation, confirmed, initial, setInitial, monthly, setMonthly }) => {
  const [timeRange, setTimeRange] = useState('all');
  const bt = useMemo(() => {
    if (!confirmed || !Object.keys(allocation).length) return null;
    return generateBacktest(allocation, initial, monthly);
  }, [allocation, confirmed, initial, monthly]);

  if (!confirmed || !Object.keys(allocation).length) return (
    <div>
      <SectionTitle icon="📈" title={t.btTitle} caption={t.btCaption} />
      <InfoBanner>{t.btLocked}</InfoBanner>
    </div>
  );

  const fmtNT      = v => 'NT$'+Math.round(v).toLocaleString();
  const fmtNTShort = v => 'NT$'+(v>=1e6?(v/1e6).toFixed(1)+'M':(v/1e3).toFixed(0)+'K');
  const rangeFrom  = TIME_RANGES.find(r => r.key===timeRange)?.from || '2010-01';
  const startIdx   = bt.labels.findIndex(l => l>=rangeFrom);
  const sl         = Math.max(0, startIdx);
  const labels     = bt.labels.slice(sl);
  const portVals   = bt.portVals.slice(sl);

            <button key={r.key} onClick={() => setTimeRange(r.key)}

        <MetricCard label={t.btTotalInv}    value={fmtNT(bt.totalInv)} />
        <MetricCard label={t.btTotalReturn} value={((bt.finalVal/bt.totalInv-1)*100).toFixed(1)+'%'}
          delta={'+'+fmtNT(bt.finalVal-bt.totalInv)} deltaPositive />
        <MetricCard label={t.btCagr} value={(bt.cagr*100).toFixed(2)+'%'} sub={t.btSince} />
      </div>
      <div style={{ background:'#fff', border:'1px solid #e8edf3', borderRadius:10, padding:'20px 20px 16px', marginBottom:14, boxShadow:'0 1px 3px rgba(0,0,0,0.05)' }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:10 }}>
          <div style={{ fontWeight:700, fontSize:14, color:'#0d1f3c' }}>{t.btPortValue}</div>
          <div style={{ fontSize:11, color:'#888' }}>{t.btHoverHint}</div>
        </div>
        <div style={{ display:'flex', flexWrap:'wrap', gap:7, marginBottom:14 }}>
          {DRAWDOWN_EVENTS.map(ev => {
            const c = EV_CHIP[ev.color]||EV_CHIP.red;
            const lbl = lang==='zh'?(ev.labelZh||ev.label):ev.label;

                <div>
                  <div style={{ fontSize:11, color:'#888' }}>{t.btPeakDD}</div>
                  <div style={{ fontSize:22, fontWeight:700, color:'#e53e3e' }}>{ddVal}%</div>
                </div>
                <div>
                  <div style={{ fontSize:11, color:'#888' }}>{t.btRecovery}</div>
                  <div style={{ fontSize:22, fontWeight:700, color:'#4182b9' }}>{ep.recovery}</div>
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
};

// ── Section: FIRE Calculator ──────────────────────────────────────────────────
const FireSection = ({ t, confirmed, btCagr }) => {
  const defaultCagr = btCagr ? (btCagr*100).toFixed(1) : '8.0';
  const [expenses,  setExpenses]  = useState(720000);
  const [savings,   setSavings]   = useState(500000);
  const [contrib,   setContrib]   = useState(20000);
  const [cagrInput, setCagrInput] = useState(defaultCagr);
  const [withdraw,  setWithdraw]  = useState(4);
  const [inflation, setInflation] = useState(2.5);

  useEffect(() => { if (btCagr) setCagrInput((btCagr*100).toFixed(1)); }, [btCagr]);

  const fire = useMemo(() => calculateFIRE({
    cagr:cagrInput/100, currentSavings:savings, monthlyContrib:contrib,
    annualExpenses:expenses, withdrawalRate:withdraw/100, inflation:inflation/100,
  }), [cagrInput, savings, contrib, expenses, withdraw, inflation]);

  const fmtNT = v => v>=1e6?'NT$'+(v/1e6).toFixed(1)+'M':'NT$'+Math.round(v).toLocaleString();

  if (!confirmed) return (
    <div>
      <SectionTitle icon="🔥" title={t.fireTitle} caption={t.fireCaption} />
      <InfoBanner>{t.fireLocked}</InfoBanner>
    </div>
  );

  return (
    <div>
      <SectionTitle icon="🔥" title={t.fireTitle} caption={t.fireCaption} />
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:24 }}>
        <div style={{ background:'#fff', border:'1px solid #e8edf3', borderRadius:10, padding:'20px 24px', boxShadow:'0 1px 3px rgba(0,0,0,0.05)' }}>
          <div style={{ fontWeight:700, fontSize:14, color:'#0d1f3c', marginBottom:18 }}>{t.fireParams}</div>
          {[[t.fireAnnualExp,expenses,setExpenses,10000],[t.fireCurrentSav,savings,setSavings,50000],[t.fireMonthlyContrib,contrib,setContrib,1000]].map(([label,val,setter,step]) => (
            <div key={label} style={{ marginBottom:14 }}>
              <div style={{ fontSize:12, fontWeight:600, color:'#555', marginBottom:4 }}>{label}</div>
              <input type="number" value={val} step={step} onChange={e => setter(+e.target.value)}
                style={{ width:'100%', padding:'8px 12px', borderRadius:6, border:'1px solid #d0d7e2', fontSize:13, fontFamily:'inherit', outline:'none' }} />
            </div>
          ))}
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:10 }}>
            {[[t.fireCagr,cagrInput,setCagrInput,0.1],[t.fireWithdraw,withdraw,setWithdraw,0.5],[t.fireInflation,inflation,setInflation,0.5]].map(([label,val,setter,step]) => (
              <div key={label}>
                <div style={{ fontSize:11, fontWeight:600, color:'#555', marginBottom:4 }}>{label}</div>
                <input type="number" value={val} step={step} onChange={e => setter(+e.target.value)}
                  style={{ width:'100%', padding:'7px 10px', borderRadius:6, border:'1px solid #d0d7e2', fontSize:13, fontFamily:'inherit', outline:'none' }} />
              </div>
            ))}
          </div>
        </div>
        <div>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12, marginBottom:16 }}>
            <MetricCard label={t.fireTarget}    value={fmtNT(fire.target)} sub={`NT$${expenses.toLocaleString()} ÷ ${withdraw}%`} />
            <MetricCard label={t.fireYearsNom}  value={fire.yearsNominal!=null?fire.yearsNominal+' yrs':t.fireYrsPlus} />
            <MetricCard label={t.fireYearsReal} value={fire.yearsReal!=null?fire.yearsReal+' yrs':t.fireYrsPlus} />
            <MetricCard label={t.fireCagrUsed}  value={parseFloat(cagrInput).toFixed(1)+'%'}
              sub={btCagr?t.fireCagrFrom:t.fireCagrManual} />
          </div>
          <div style={{ background:'#fff', border:'1px solid #e8edf3', borderRadius:10, padding:'16px 20px', boxShadow:'0 1px 3px rgba(0,0,0,0.05)' }}>
            <div style={{ fontWeight:600, fontSize:14, color:'#0d1f3c', marginBottom:14 }}>{t.fireProjection}</div>
            <ChartLine labels={fire.labels}
              yFmt={v=>v>=1e6?'NT$'+(v/1e6).toFixed(1)+'M':'NT$'+(v/1e3).toFixed(0)+'K'}
              datasets={[
                { label:t.fireNominal,    data:fire.nomVals,  borderColor:'#4182b9', backgroundColor:'rgba(65,130,185,0.10)', borderWidth:2, pointRadius:0, fill:true, tension:0.4 },
                { label:t.fireReal,       data:fire.realVals, borderColor:'#72a8d4', backgroundColor:'transparent', borderWidth:1.5, pointRadius:0, borderDash:[5,4], tension:0.4 },
                { label:t.fireTargetLine, data:fire.labels.map(()=>fire.target), borderColor:'#e53e3e', backgroundColor:'transparent', borderWidth:1.5, pointRadius:0, borderDash:[8,4] },
              ]} />
          </div>
        </div>
      </div>
    </div>
  );
};

// ── Section: Summary ──────────────────────────────────────────────────────────
const SummarySection = ({ t, lang, watchlist, allocation, riskLevel, btCagr, confirmed }) => {
  if (!confirmed || !Object.keys(allocation).length) return (
    <div>
      <SectionTitle icon="📋" title={t.summaryTitle} caption={t.summaryCaption} />
      <InfoBanner>{t.summaryLocked}</InfoBanner>
    </div>
  );

  const allItems = Object.entries(allocation)
    .map(([tk,w]) => { const a=PPL_ASSETS.find(x=>x.ticker===tk); return { ticker:tk, weight:w, name:a?.name, cagr:a?.cagr }; })
    .filter(x=>x.name).sort((a,b) => b.weight-a.weight);
  const topAssets = allItems.slice(0,3).map(a=>`${a.ticker} (${(a.weight*100).toFixed(0)}%)`).join(', ');
  const riskLabel = t[RISK_LABEL_KEY[riskLevel]] || riskLevel;
  const insights  = generatePortfolioInsights(allocation, riskLevel, btCagr, lang);

  return (
    <div>
      <SectionTitle icon="📋" title={t.summaryTitle} caption={t.summaryCaption} />
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:16 }}>
        <div style={{ background:'#fff', border:'1px solid #e8edf3', borderRadius:10, padding:'20px 24px', boxShadow:'0 1px 3px rgba(0,0,0,0.05)' }}>
          <div style={{ fontWeight:700, fontSize:15, color:'#0d1f3c', marginBottom:16 }}>{t.summaryStructure}</div>
          <div style={{ fontSize:14, color:'#333', lineHeight:2 }}>
            <div>{t.summaryRisk} <strong>{riskLabel}</strong></div>
            <div>{t.summaryAssets} <strong>{watchlist.length}</strong></div>
            <div>{t.summaryTop} <strong style={{ color:'#0a326e' }}>{topAssets}</strong></div>
            {btCagr && <div>{t.summaryCagr} <strong style={{ color:'#21a350' }}>{(btCagr*100).toFixed(2)}%</strong></div>}
          </div>
          <div style={{ marginTop:18, padding:'12px 16px', background:'#f7f9fc', borderRadius:8, fontSize:13, color:'#555', lineHeight:1.7 }}>
            <span dangerouslySetInnerHTML={{ __html:t.summaryNote }} />
          </div>
        </div>

        <div style={{ background:'linear-gradient(135deg,#0d1f3c 0%,#1e5a96 100%)', borderRadius:10, padding:'20px 24px', color:'#fff' }}>
          <div style={{ fontWeight:700, fontSize:15, marginBottom:4 }}>{t.summaryAI}</div>
          <div style={{ fontSize:12, color:'rgba(255,255,255,0.5)', marginBottom:16 }}>{t.summaryAITagline}</div>
          <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
            {insights.map((ins,i) => (
              <div key={i} style={{ background:'rgba(255,255,255,0.09)', borderRadius:8, padding:'11px 14px', fontSize:13, color:'rgba(255,255,255,0.88)', lineHeight:1.7 }}>
                {ins}
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
};

// ── Main App — single-page scrollable layout ──────────────────────────────────
const SECTION_STYLE = { padding:'44px 48px' };
const DIVIDER       = { borderTop:'2px solid #f0f2f6' };

const App = () => {
  const [lang,       setLang]       = useState('en');
  const [activeNav,  setActiveNav]  = useState('intro');
  const [watchlist,  setWatchlist]  = useState([]);
  const [confirmed,  setConfirmed]  = useState(false);
  const [persona,    setPersona]    = useState(null);
  const [riskLevel,  setRiskLevel]  = useState('Medium');
  const [allocation, setAllocation] = useState({});
  const [initial,    setInitial]    = useState(300000);
  const [monthly,    setMonthly]    = useState(15000);

  const mainRef = useRef();
  const t = T[lang] || T.en;

  // Weighted CAGR from asset data — reliable for FIRE projections
  const btCagr = useMemo(() => {
    if (!confirmed || !Object.keys(allocation).length) return null;
    let wc = 0;
    Object.entries(allocation).forEach(([tk,w]) => {
      const a = PPL_ASSETS.find(x => x.ticker===tk);
      if (a) wc += w * a.cagr / 100;
    });
    return wc;
  }, [allocation, confirmed]);

  const scrollTo = useCallback((id) => {
    const el   = document.getElementById('section-'+id);
    const main = mainRef.current;
    if (!el || !main) return;
    main.scrollTo({ top: el.offsetTop - 20, behavior:'smooth' });
  }, []);

  // Track active section while scrolling
  useEffect(() => {
    const main = mainRef.current;
    if (!main) return;
    const onScroll = () => {
      const top = main.scrollTop + 120;
      let cur = 'intro';
      for (const { id } of NAV_ITEMS) {
        const el = document.getElementById('section-'+id);
        if (el && el.offsetTop <= top) cur = id;
      }
      setActiveNav(cur);
    };
    main.addEventListener('scroll', onScroll, { passive:true });
    return () => main.removeEventListener('scroll', onScroll);
  }, []);

  const sectionProps = {
    t, lang, watchlist, setWatchlist, confirmed, setConfirmed,
    persona, setPersona, riskLevel, setRiskLevel,
    allocation, setAllocation, initial, setInitial, monthly, setMonthly, btCagr,
  };

  return (
    <div style={{ display:'flex', minHeight:'100vh', fontFamily:"'Source Sans 3',system-ui,sans-serif", background:'#f7f9fc' }}>
      <Sidebar active={activeNav} onNav={scrollTo} lang={lang} setLang={setLang} t={t} confirmed={confirmed} />
      <main ref={mainRef} style={{ flex:1, overflowY:'auto', minWidth:0 }}>
        <div id="section-intro"       style={SECTION_STYLE}><IntroSection       {...sectionProps} /></div>
        <div style={DIVIDER} />
        <div id="section-screening"   style={SECTION_STYLE}><AssetScreening     {...sectionProps} onReviewPortfolio={() => scrollTo('correlation')} /></div>
        <div style={DIVIDER} />
        <div id="section-correlation" style={SECTION_STYLE}><CorrelationSection {...sectionProps} lang={lang} /></div>
        <div style={DIVIDER} />
        <div id="section-allocation"  style={SECTION_STYLE}><RiskAllocation     {...sectionProps} /></div>
        <div style={DIVIDER} />
        <div id="section-backtest"    style={SECTION_STYLE}><BacktestSection     {...sectionProps} /></div>
        <div style={DIVIDER} />
        <div id="section-fire"        style={SECTION_STYLE}><FireSection         {...sectionProps} /></div>
        <div style={DIVIDER} />
        <div id="section-summary"     style={SECTION_STYLE}><SummarySection      {...sectionProps} /></div>
        <div style={{ height:80 }} />
      </main>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

  <script>
    (function waitForRoot() {
      const observer = new MutationObserver(() => {
        const root = document.getElementById('root');
        if (root && root.children.length > 0) {
          const loader = document.getElementById('loading');
          if (loader) loader.style.display = 'none';
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById('root'), { childList:true });
    })();
  </script>
</body>
</html>
