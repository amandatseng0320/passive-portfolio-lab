<html lang="en">
<head>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root {
      height: 100%;
      width: 100%;
      overflow-x: hidden;
      font-family: 'Source Sans 3', system-ui, -apple-system, sans-serif;
      background: #f7f9fc; color: #111;
      -webkit-font-smoothing: antialiased;
    }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #c8cdd6; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #9aa0ad; }
    #root { display: flex; }
    main  { flex: 1; overflow-y: auto; min-width: 0; }
    tbody tr:hover { background: #f0f6ff !important; }
    input:focus, select:focus {
      outline: none; border-color: #4182b9 !important;
      box-shadow: 0 0 0 3px rgba(65,130,185,0.12);

      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: #0d1f3c; color: #a8cae8;
      font-family: 'Source Sans 3', system-ui, sans-serif;
      font-size: 14px; letter-spacing: 0.06em; z-index: 9999;

  <style>
    /* ── Mobile responsive ──────────────────────────────────────────────── */
    #ppl-sidebar {
      transition: transform 0.25s ease;
    }
    #ppl-hamburger {
      display: none;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.25);
      color: #fff;
      border-radius: 6px;
      padding: 7px 11px;
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      flex-shrink: 0;
    }
    #ppl-sidebar-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 299;
    }
    .ppl-asset-detail-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(320px, 0.95fr);
      gap: 14px;
      align-items: stretch;
    }
    .ppl-asset-metric-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    .ppl-profile-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    /* Prevent any element from pushing past the viewport width */
    html, body { overflow-x: hidden; max-width: 100vw; }
    #ppl-main  { overflow-x: hidden; }

    @media (max-width: 767px) {
      #ppl-hamburger { display: block; }

      #ppl-sidebar {
        position: fixed !important;
        top: 0; left: 0;
        height: 100vh !important;
        z-index: 300;
        transform: translateX(-100%);
      }
      #ppl-sidebar.sidebar-open {
        transform: translateX(0);
      }
      #ppl-sidebar-overlay.overlay-open {
        display: block;
      }
      .sidebar-close-btn { display: flex !important; }

      /* App header: compact on mobile */
      #ppl-app-header {
        padding: 14px 16px !important;
        flex-wrap: wrap;
        gap: 8px !important;
      }
      #ppl-app-header .header-sep     { display: none; }
      #ppl-app-header .header-tagline { display: none; }

      /* Section padding — target actual section divs (inline style uses id^=section-) */
      [id^="section-"] {
        padding-left: 16px !important;
        padding-right: 16px !important;
        padding-top: 28px !important;
        padding-bottom: 28px !important;
      }

      /* Text: wrap long strings instead of overflowing */
      #ppl-main * {
        word-break: break-word;
        overflow-wrap: break-word;
        min-width: 0;
      }

      /* Tables: allow horizontal scroll without stretching page */
      table {
        display: block; overflow-x: auto;
        white-space: nowrap; max-width: 100%;
      }

      /* Charts: don't overflow */
      canvas { max-width: 100% !important; width: 100% !important; }

      /* MetricCard grid: stack on very small screens */
      .ppl-metric-grid {
        grid-template-columns: 1fr 1fr !important;
      }

      /* Responsive metric grids */
      .ppl-grid-2 { grid-template-columns: 1fr !important; }
      .ppl-grid-3 { grid-template-columns: repeat(2, 1fr) !important; }
      .ppl-grid-4 { grid-template-columns: repeat(2, 1fr) !important; }
      .ppl-grid-5 { grid-template-columns: repeat(2, 1fr) !important; }
      .ppl-asset-detail-grid {
        grid-template-columns: 1fr !important;
      }
      .ppl-asset-metric-grid,
      .ppl-profile-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
      }

      /* Any element with explicit wide inline width: cap it */
      #ppl-main > * { max-width: 100vw; }
    }

    @media (max-width: 480px) {
      .ppl-metric-grid,
      .ppl-grid-2,
      .ppl-grid-3,
      .ppl-grid-4,
      .ppl-grid-5,
      .ppl-asset-metric-grid,
      .ppl-profile-grid {
        grid-template-columns: 1fr !important;
      }
    }

    /* ── Instruction popup ──────────────────────────────────────────────── */
    #ppl-help-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 500;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    #ppl-help-box {
      background: #fff;
      border-radius: 12px;
      padding: 32px 36px;
      max-width: 540px;
      width: 100%;
      max-height: 88vh;
      overflow-y: auto;
      box-shadow: 0 8px 40px rgba(0,0,0,0.22);
      position: relative;
    }
    #ppl-help-box h2 {
      font-size: 20px; font-weight: 700; color: #0d1f3c;
      margin-bottom: 6px;
    }
    #ppl-help-box .help-sub {
      font-size: 13px; color: #6b727e; margin-bottom: 20px;
    }
    #ppl-help-box .help-step {
      display: flex; gap: 14px; margin-bottom: 16px; align-items: flex-start;
    }
    #ppl-help-box .help-num {
      flex-shrink: 0;
      width: 28px; height: 28px;
      background: #4182b9; color: #fff;
      border-radius: 50%; font-size: 13px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }
    #ppl-help-box .help-text strong { color: #0d1f3c; }
    #ppl-help-box .help-text { font-size: 14px; line-height: 1.6; color: #444; }
    #ppl-help-box .help-note {
      background: #eff5fb; border-left: 3px solid #4182b9; border-radius: 6px;
      padding: 10px 14px; font-size: 13px; color: #1f3b5c;
      line-height: 1.6; margin-top: 20px;
    }
    #ppl-help-close {
      margin-top: 24px;
      background: #4182b9; color: #fff;
      border: none; border-radius: 7px;
      padding: 10px 24px; font-size: 14px; font-weight: 600;
      cursor: pointer; font-family: inherit; width: 100%;
    }
    #ppl-help-close:hover { background: #1e5a96; }

    @media (max-width: 480px) {
      #ppl-help-box { padding: 24px 20px; }
    }
  </style>
</head>

  <script type="text/babel">

const CARD = { background:'#fff', border:'1px solid #e8edf3', borderRadius:10, boxShadow:'0 1px 3px rgba(0,0,0,0.05)' };
const LABEL_SM = { fontSize:12, fontWeight:600, color:'#555', marginBottom:4 };

const Badge = ({ label, variant = 'blue' }) => {
  const colors = {
    blue:  ['#d2e4f5','#0a326e'], green: ['#d4f0e0','#0e5a2a'],
    amber: ['#fef3c7','#7a4a00'], gray:  ['#f0f2f6','#555'],
    red:   ['#fff5f5','#c0392b'], navy:  ['#0a326e','#fff'],
  };
  const [bg, color] = colors[variant] || colors.gray;
  return (
    <span style={{ display:'inline-block', padding:'2px 8px', borderRadius:9999,
      fontSize:11, fontWeight:700, letterSpacing:'0.04em',
      textTransform:'uppercase', background:bg, color }}>
      {label}
    </span>

};

const MetricCard = ({ label, value, delta, deltaPositive, sub }) => (
  <div style={{ background:'#fff', border:'1px solid #e8edf3', borderRadius:10,
    padding:'16px 20px', minWidth:0, boxShadow:'0 1px 3px rgba(0,0,0,0.06)' }}>
    <div style={{ fontSize:11, color:'#6b727e', fontWeight:700, textTransform:'uppercase',
      letterSpacing:'0.06em', marginBottom:6 }}>{label}</div>
    <div style={{ fontSize:'1.5rem', fontWeight:700, color:'#111', lineHeight:1.15 }}>{value}</div>
    {delta && <div style={{ fontSize:12, color:deltaPositive?'#21a350':'#e53e3e', marginTop:5, fontWeight:600 }}>{delta}</div>}
    {sub && <div style={{ fontSize:12, color:'#999', marginTop:3 }}>{sub}</div>}
  </div>
);

const getAssetProfile = ticker => {
  if (typeof PPL_ASSET_PROFILES === 'undefined') return null;
  return PPL_ASSET_PROFILES[ticker] || null;
};

const AssetProfilePanel = ({ profile, t }) => {
  if (!profile) {
    return (
      <div style={{ height:'100%', padding:'14px 16px', border:'1px solid #e8edf3',
        borderRadius:8, background:'#f8fafc', color:'#687385', fontSize:13 }}>
        {t.assetProfileEmpty}
      </div>
    );
  }
  const isCrypto = profile.assetType === 'Crypto';
  const sourceLabel = profile.collectionMethod === 'web_scraping'
    ? `${t.profileScrapedSource}: ${profile.sourceName || t.profileSource}`
    : `${t.profileSource}: ${profile.sourceName || ''}`;
  const expenseText = profile.managementFee && profile.custodianFee
    ? `${profile.expenseRatio}（${t.profileExpenseIncludes} ${t.profileManagementFee} ${profile.managementFee} ${t.profileExpenseAnd} ${t.profileCustodianFee} ${profile.custodianFee}）`
    : profile.expenseRatio;
  const rows = isCrypto
    ? [
        [t.profileType, profile.assetType],
        [t.profileCategory, profile.cryptoCategory || profile.category],
        [t.profileBlockchain, profile.blockchain],
        [t.profileIssuer, profile.issuer],
        [t.profileConsensus, profile.consensus],
      ]
    : [
        [t.profileType, profile.assetType],
        [t.profileCategory, profile.category],
        [t.profileIssuer, profile.issuer],
        [t.profileExpense, expenseText],
        [t.profileDividend, profile.dividendPolicy],
      ];
  return (
    <div style={{ height:'100%', padding:'14px 16px', border:'1px solid #d7e6f5',
      borderRadius:8, background:'#f8fbff' }}>
      <div style={{ fontSize:14, fontWeight:700, color:'#0d1f3c', marginBottom:8 }}>
        {t.assetProfileTitle}
      </div>
      <div style={{ fontSize:13, color:'#344256', lineHeight:1.55, marginBottom:10 }}>
        {profile.summary}
      </div>
      <div className="ppl-profile-grid" style={{ marginBottom:10 }}>
        {rows.filter(([, value]) => value).map(([label, value]) => (
          <div key={label} style={{ background:'#fff', border:'1px solid #e8edf3',
            borderRadius:7, padding:'8px 10px' }}>
            <div style={{ fontSize:11, fontWeight:700, color:'#69758a',
              textTransform:'uppercase', marginBottom:3 }}>{label}</div>
            <div style={{ fontSize:13, color:'#111827' }}>{value}</div>
          </div>
        ))}
      </div>
      <div style={{ display:'flex', justifyContent:'space-between', gap:10,
        flexWrap:'wrap', fontSize:12, color:'#69758a' }}>
        <span>{t.profileUpdated}: {profile.fetchedAt || 'N/A'}</span>
        {profile.sourceUrl && (
          <a href={profile.sourceUrl} target="_blank" rel="noreferrer"
            style={{ color:'#1e5a96', fontWeight:700, textDecoration:'none' }}>
            {sourceLabel}
          </a>
        )}
        {profile.expenseRatioSourceUrl && profile.expenseRatioSourceUrl !== profile.sourceUrl && (
          <a href={profile.expenseRatioSourceUrl} target="_blank" rel="noreferrer"
            style={{ color:'#1e5a96', fontWeight:700, textDecoration:'none' }}>
            {t.profileExpenseSource}: {profile.expenseRatioSourceName || t.profileSource}
          </a>
        )}
      </div>
    </div>
  );
};

const SectionTitle = ({ icon, title, caption }) => (
  <div style={{ marginBottom:28 }}>
    <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:4 }}>
      {icon && <span style={{ fontSize:22 }}>{icon}</span>}
      <h2 style={{ margin:0, fontSize:26, fontWeight:700, color:'#0d1f3c', lineHeight:1.2 }}>{title}</h2>
    </div>
    {caption && <p style={{ margin:0, fontSize:14, color:'#6b727e', paddingLeft:icon?32:0, lineHeight:1.6 }}>{caption}</p>}
    <div style={{ height:3, width:48, background:'#4182b9', borderRadius:9999, marginTop:10, marginLeft:icon?32:0 }} />

);

const InfoBanner = ({ children, type = 'info' }) => {
  const styles = {
    info:    { bg:'#eff5fb', border:'#4182b9', color:'#1f3b5c' },
    success: { bg:'#f0faf4', border:'#21a350', color:'#0e5a2a' },
    warning: { bg:'#fff8f0', border:'#e8a000', color:'#7a4a00' },
    error:   { bg:'#fff5f5', border:'#e53e3e', color:'#7a0000' },
  };
  const s = styles[type] || styles.info;
  return (
    <div style={{ background:s.bg, borderLeft:`3px solid ${s.border}`, color:s.color,
      borderRadius:6, padding:'10px 16px', fontSize:14, lineHeight:1.65, marginBottom:20 }}>
      {children}
    </div>
  );
};

const displayFxRate = () => (typeof PPL_FX_RATE !== 'undefined' && PPL_FX_RATE) ? PPL_FX_RATE : 32.5;
const convertDisplayMoney = (value, displayCurrency) => displayCurrency === 'USD' ? value / displayFxRate() : value;
const formatMoney = (value, displayCurrency = 'TWD', compact = false) => {
  const converted = convertDisplayMoney(value, displayCurrency);
  const symbol = displayCurrency === 'USD' ? '$' : 'NT$';
  if (compact) {
    const abs = Math.abs(converted);
    if (abs >= 1e9) return symbol + (converted / 1e9).toFixed(1) + 'B';
    if (abs >= 1e6) return symbol + (converted / 1e6).toFixed(1) + 'M';
    if (abs >= 1e3) return symbol + (converted / 1e3).toFixed(0) + 'K';
  }
  return symbol + Math.round(converted).toLocaleString();
};

const Btn = ({ children, onClick, variant = 'primary', disabled = false, small = false }) => {
  const variants = {
    primary:   { bg:'#4182b9', color:'#fff',   border:'#4182b9',  hbg:'#1e5a96', hborder:'#1e5a96' },
    secondary: { bg:'transparent', color:'#4182b9', border:'#4182b9', hbg:'#eff5fb', hborder:'#4182b9' },
    ghost:     { bg:'#f0f2f6', color:'#333',   border:'#e0e4eb',  hbg:'#e0e4eb', hborder:'#c8cdd6' },
    danger:    { bg:'#e53e3e', color:'#fff',   border:'#e53e3e',  hbg:'#c0392b', hborder:'#c0392b' },
  };
  const v = variants[variant] || variants.primary;
  const [hover, setHover] = React.useState(false);
  return (
    <button onClick={onClick} disabled={disabled}
      onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}
      style={{ display:'inline-flex', alignItems:'center', justifyContent:'center', gap:6,
        padding:small?'5px 12px':'8px 18px', borderRadius:6,
        fontSize:small?13:14, fontWeight:600,
        cursor:disabled?'not-allowed':'pointer',
        border:`1px solid ${disabled?'#d0d7e2':(hover?v.hborder:v.border)}`,
        background:disabled?'#f0f2f6':(hover?v.hbg:v.bg),
        color:disabled?'#aaa':v.color,
        transition:'all 0.15s', fontFamily:'inherit' }}>
      {children}
    </button>
  );
};

const CurrencyToggle = ({ t, displayCurrency, setDisplayCurrency, compact = false }) => (
  <div style={{ display:'flex', alignItems:'center', gap:compact?6:10, flexWrap:'wrap' }}>

      {['TWD','USD'].map(cur => (
        <button key={cur} onClick={() => setDisplayCurrency(cur)}
          style={{ padding:compact?'5px 10px':'7px 13px', border:'none', cursor:'pointer',

            color:displayCurrency===cur?'#0d1f3c':'rgba(255,255,255,0.78)',
            fontSize:12, fontWeight:700, fontFamily:'inherit' }}>
          {cur}
        </button>
      ))}
    </div>
  </div>
);

const ChartLine = ({ labels, datasets, height=260, yFmt, events=[], extraInfo=[], hLines=[], lang='en' }) => {
  const ref = React.useRef();
  const chartRef = React.useRef();

  React.useEffect(() => {
    if (!ref.current) return;
    if (chartRef.current) chartRef.current.destroy();

    const EV_COLORS = {
      red:    { bg:'rgba(229,62,62,0.09)',  border:'rgba(229,62,62,0.30)',  text:'#c53030' },
      orange: { bg:'rgba(214,105,0,0.09)',  border:'rgba(214,105,0,0.30)',  text:'#a05000' },
      purple: { bg:'rgba(107,57,196,0.09)', border:'rgba(107,57,196,0.30)', text:'#6b39c4' },
    };
    const annotations = {};

    events.forEach((ev, i) => {
      const ec = EV_COLORS[ev.color] || EV_COLORS.red;
      const evLabel = lang==='zh' ? (ev.labelZh||ev.label) : ev.label;
      annotations[`evBox${i}`] = { type:'box', xMin:ev.xMin, xMax:ev.xMax,
        backgroundColor:ec.bg, borderColor:ec.border, borderWidth:1 };
      annotations[`evLine${i}`] = { type:'line', xMin:ev.xMin, xMax:ev.xMin,
        borderColor:ec.border, borderWidth:1.5, borderDash:[3,3],
        label:{ display:true, content:evLabel, position:'start', color:ec.text,
          backgroundColor:'rgba(255,255,255,0.90)',
          font:{size:10,weight:'600'}, padding:{x:5,y:3}, borderRadius:4, yAdjust:6, xAdjust:4 } };
    });

    hLines.forEach((hl, i) => {
      annotations[`hLine${i}`] = { type:'line', yMin:hl.value, yMax:hl.value,
        borderColor:hl.color||'rgba(150,150,150,0.35)', borderWidth:1, borderDash:[5,4],
        label:{ display:true, content:hl.label, position:'100%',
          color:hl.color||'#999', backgroundColor:'transparent',
          font:{size:10,weight:'600'}, xAdjust:-4 } };
    });

    chartRef.current = new Chart(ref.current, {
      type:'line', data:{ labels, datasets },
      options:{
        responsive:true, maintainAspectRatio:false, animation:{duration:400},
        interaction:{mode:'index',intersect:false},
        plugins:{
          legend:{ position:'top', labels:{boxWidth:10,font:{size:12},usePointStyle:true,pointStyleWidth:10} },
          tooltip:{
            backgroundColor:'#0d1f3c', titleColor:'#a8cae8', bodyColor:'#d2e4f5',
            borderColor:'#1e5a96', borderWidth:1, padding:{x:14,y:12}, cornerRadius:8,
            titleFont:{size:12,weight:'700'}, bodyFont:{size:12},
            callbacks:{
              title:items=>'📅 '+items[0].label,
              label:ctx=>{
                const v=ctx.parsed.y;
                const fmt=yFmt?yFmt(v,ctx.dataset.label):v.toLocaleString();
                return `  ${ctx.dataset.label}: ${fmt}`;
              },
              afterBody:items=>{
                const idx=items[0].dataIndex;
                if (extraInfo.length && extraInfo[idx]!==undefined) {
                  const dd=extraInfo[idx];
                  const bar=dd<-30?'🔴':dd<-15?'🟡':'🟢';
                  return ['',`  ${bar} Drawdown: ${dd.toFixed(1)}%`];
                }
                return [];
              },
            },
          },
          annotation:{annotations},
        },
        scales:{
          x:{ grid:{display:false}, ticks:{maxTicksLimit:10,font:{size:11},color:'#888'} },
          y:{ grid:{color:'#f0f2f6'}, ticks:{font:{size:11},color:'#888',
            callback:v=>yFmt?yFmt(v):v.toLocaleString()} },
        },
      },
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [JSON.stringify(labels),JSON.stringify(datasets),JSON.stringify(events),
      JSON.stringify(hLines),JSON.stringify(extraInfo),lang,yFmt]);

  return <div style={{ height, position:'relative' }}><canvas ref={ref} /></div>;
};

const ChartBar = ({ labels, data, height=220 }) => {
  const ref = React.useRef();
  const chartRef = React.useRef();
  React.useEffect(() => {
    if (!ref.current) return;
    if (chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(ref.current, {
      type:'bar',
      data:{ labels, datasets:[{ data, backgroundColor:data.map(v=>v>=0?'#4182b9':'#e53e3e'), borderRadius:3, borderSkipped:false }] },
      options:{
        responsive:true, maintainAspectRatio:false, animation:{duration:400},
        plugins:{ legend:{display:false},
          tooltip:{ backgroundColor:'#0d1f3c', titleColor:'#a8cae8', bodyColor:'#d2e4f5',
            borderColor:'#1e5a96', borderWidth:1, cornerRadius:8,
            callbacks:{label:ctx=>`  Return: ${ctx.parsed.y.toFixed(1)}%`} } },
        scales:{
          x:{grid:{display:false},ticks:{font:{size:11},color:'#888'}},
          y:{grid:{color:'#f0f2f6'},ticks:{font:{size:11},color:'#888',callback:v=>v+'%'}},
        },
      },
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [JSON.stringify(labels),JSON.stringify(data)]);
  return <div style={{ height, position:'relative' }}><canvas ref={ref} /></div>;
};

// ── Treemap — squarified layout (more square tiles) ──────────────────────────
function _tmWorstRatio(row, edge) {
  if (!row.length) return Infinity;
  const rowArea = row.reduce((s, n) => s + n.area, 0);
  const strip   = rowArea / edge;
  let worst = 0;
  for (const n of row) {
    const other = n.area / strip;
    const r = Math.max(strip / other, other / strip);
    if (r > worst) worst = r;
  }
  return worst;
}

function _tmLayoutStrip(row, x, y, w, h, result) {
  const rowArea = row.reduce((s, n) => s + n.area, 0);
  let pos = (w >= h) ? x : y;
  for (const n of row) {
    const frac = n.area / rowArea;
    if (w >= h) { result.push({ ...n, x: pos, y, w: frac * w, h }); pos += frac * w; }
    else         { result.push({ ...n, x, y: pos, w, h: frac * h }); pos += frac * h; }
  }
}

function treemapLayout(items, x, y, w, h) {
  if (!items.length) return [];
  const total  = items.reduce((s, i) => s + i.weight, 0);
  const nodes  = items.map(i => ({ ...i, area: (i.weight / total) * w * h }));
  const result = [];
  let cx = x, cy = y, cw = w, ch = h, row = [];

  for (const node of nodes) {
    const edge    = Math.min(cw, ch);
    const testRow = [...row, node];
    if (row.length === 0 || _tmWorstRatio(testRow, edge) <= _tmWorstRatio(row, edge)) {
      row.push(node);
    } else {
      const rowArea = row.reduce((s, n) => s + n.area, 0);
      if (cw >= ch) { const rw = rowArea / ch; _tmLayoutStrip(row, cx, cy, rw, ch, result); cx += rw; cw -= rw; }
      else           { const rh = rowArea / cw; _tmLayoutStrip(row, cx, cy, cw, rh, result); cy += rh; ch -= rh; }
      row = [node];
    }
  }
  if (row.length) _tmLayoutStrip(row, cx, cy, cw, ch, result);
  return result;
}

const Treemap = ({ items, onSelect, selectedTicker }) => {
  if (!items || !items.length) return null;
  const sorted = [...items].sort((a, b) => b.weight - a.weight);
  const tiles  = treemapLayout(sorted, 0, 0, 1, 1);

  return (
    <div style={{ position:'relative', height:280, borderRadius:10, overflow:'hidden' }}>
      {tiles.map(tile => {
        const colorIdx = Math.min(Math.max(Math.floor(tile.volTier ?? 2), 0), 5);
        const bg  = PPL_BLUE6[colorIdx];
        const light = colorIdx <= 1;
        const tc  = light ? '#0a326e' : '#fff';
        const stc = light ? '#1e5a96' : 'rgba(255,255,255,0.75)';
        const isSel  = selectedTicker === tile.ticker;
        const pct    = (tile.weight * 100).toFixed(1);
        const showLabel = tile.w > 0.07;
        const showPct   = tile.w > 0.10 && tile.h > 0.18;

        return (
          <div key={tile.ticker}
            onClick={() => onSelect(isSel ? null : tile.ticker)}
            title={`${tile.ticker} — ${tile.name}  |  ${pct}%  CAGR ${tile.cagr?.toFixed(1)}%  Vol ${tile.vol?.toFixed(1)}%`}
            style={{
              position:'absolute',
              left:`${tile.x*100}%`, top:`${tile.y*100}%`,
              width:`${tile.w*100}%`, height:`${tile.h*100}%`,
              background:bg,
              border:isSel ? '2px solid rgba(255,255,255,0.9)' : '1px solid rgba(255,255,255,0.18)',
              boxSizing:'border-box',
              display:'flex', flexDirection:'column', justifyContent:'flex-start',
              padding:'6px 8px', cursor:'pointer', overflow:'hidden',
              filter:isSel ? 'brightness(1.14)' : 'none',
              transition:'filter 0.15s, border 0.1s',
            }}>
            {showLabel && <div style={{ fontSize:12, fontWeight:700, color:tc, lineHeight:1.2, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{tile.ticker}</div>}
            {showPct   && <div style={{ fontSize:11, color:stc }}>{pct}%</div>}
          </div>
        );
      })}
    </div>
  );
};

// ── AI insights (rule-based, no API key needed) ───────────────────────────────
function generatePortfolioInsights(allocation, riskLevel, btCagr, lang) {
  const allItems = Object.entries(allocation).map(([tk, w]) => {
    const a = assetMap.get(tk);
    return a ? { ticker:tk, weight:w, ...a } : null;
  }).filter(Boolean).sort((a, b) => b.weight - a.weight);
  if (!allItems.length) return [];

  const wMaxDD   = allItems.reduce((s, i) => s + i.weight * (i.maxDD || 0), 0);
  const cryptoW  = allItems.filter(i => i.category === 'CRYPTO').reduce((s, i) => s + i.weight, 0);
  const bondCats = ['US Total Bond','Intermediate US Treasury','Bond'];
  const bondW    = allItems.filter(i => bondCats.includes(i.subcategory)).reduce((s, i) => s + i.weight, 0);
  const top      = allItems[0];
  const cagrPct  = btCagr ? (btCagr * 100).toFixed(1) : '—';
  const zh = lang === 'zh';
  const ins = [];

  if (top && top.weight > 0.30) {
    ins.push(zh
      ? `📊 ${top.ticker} 佔比達 ${(top.weight*100).toFixed(0)}%，集中度偏高。建議加入 1–2 個低相關資產，將最大單一持倉壓低至 30% 以內，降低個別資產風險對整體的衝擊。`
      : `📊 ${top.ticker} is ${(top.weight*100).toFixed(0)}% of the portfolio — high concentration. Adding 1–2 low-correlation assets to keep the largest single position below 30% would reduce idiosyncratic risk.`);
  }

  if (cryptoW > 0.20) {
    ins.push(zh
      ? `⚠️ 加密貨幣合計佔 ${(cryptoW*100).toFixed(0)}%，極端行情下可能數週內跌超 50%。請確認即使帳面虧損過半，你在財務和心理上仍能持有而不被迫賣出。`
      : `⚠️ Crypto totals ${(cryptoW*100).toFixed(0)}% — in extreme events it can drop 50%+ within weeks. Confirm you can hold without being forced to sell even if paper losses exceed half your crypto value.`);
  } else if (cryptoW > 0) {
    ins.push(zh
      ? `✅ 加密貨幣佔比 ${(cryptoW*100).toFixed(0)}%，屬合理的衛星倉位：有助提升長期 CAGR，同時將極端風險侷限在組合的一小部分。建議設下再平衡上限（如 15%），避免牛市中佔比過度膨脹。`
      : `✅ Crypto at ${(cryptoW*100).toFixed(0)}% is a reasonable satellite — boosts long-term CAGR while capping extreme risk. Set a rebalancing ceiling (e.g. 15%) so bull-run drift doesn't let it dominate.`);
  }

  if (bondW > 0.25) {
    ins.push(zh
      ? `🛡️ 債券配比 ${(bondW*100).toFixed(0)}%，有效緩衝市場震盪，但會壓低長期報酬。以加權 CAGR ${cagrPct}% 計算，扣除通膨後的實質報酬可能低於預期——若距退休尚遠，建議定期檢視是否可降低債券比重。`
      : `🛡️ Bond weight at ${(bondW*100).toFixed(0)}% absorbs volatility effectively but compresses long-term returns. At a ${cagrPct}% weighted CAGR, real returns after inflation may be modest. If retirement is distant, review whether reducing bond weight is appropriate.`);
  }

  if (Math.abs(wMaxDD) > 35) {
    ins.push(zh
      ? `📉 加權最大回撤估計 ~${Math.abs(wMaxDD).toFixed(0)}%。建議現在就寫下「無論跌多深都不賣」的書面承諾，並設好再平衡提醒——研究顯示，在市場恐慌時提前做好計畫的投資人，長期報酬顯著優於臨場決策者。`
      : `📉 Estimated max drawdown ~${Math.abs(wMaxDD).toFixed(0)}%. Write a "no-sell" commitment now and set rebalance reminders. Research shows investors with pre-committed plans significantly outperform those who decide in the moment of panic.`);
  }

  ins.push(zh
    ? `🔄 建議每季執行再平衡：當任一持倉偏離目標比例超過 5% 時，賣出超配資產、買進低配資產。這樣能系統性地做到「高賣低買」，並長期維持與你風險承受度一致的曝險結構。`
    : `🔄 Rebalance quarterly: when any holding drifts more than 5% from target, sell the over-weight and buy the under-weight. This enforces systematic buy-low-sell-high and keeps risk exposure aligned with your tolerance over time.`);

  return ins.slice(0, 4);
}

const SORT_COLS  = [

const AssetScreening = ({ t, lang, watchlist, setWatchlist, setConfirmed, setPersona, onReviewPortfolio }) => {
  const [search,  setSearch]  = useState('');
  const [cat,     setCat]     = useState('All');
  const [cagrMin, setCagrMin] = useState(0);
  const [sortKey, setSortKey] = useState(null);
  const [sortDir, setSortDir] = useState('desc');
  const catLabel = { All:t.catAll, TW_ETF:t.catTW, US_ETF:t.catUS, CRYPTO:t.catCrypto };

  const colLabels = ['', t.colTicker, t.colName, t.colCategory, t.colSubcategory, t.colCagr, t.colVol, t.colMaxDD, t.colSharpe, t.colAum];

  const filtered = useMemo(() => PPL_ASSETS.filter(a => {
    if (cat !== 'All' && a.category !== cat) return false;
    if (a.cagr < cagrMin) return false;
    if (search) {
      const q = search.toLowerCase();
      const displayName = (lang === 'zh' && a.nameZh) ? a.nameZh : a.name;
      if (!a.ticker.toLowerCase().includes(q) && !a.name.toLowerCase().includes(q) && !displayName.toLowerCase().includes(q)) return false;
    }
    return true;
  }), [cat, cagrMin, search]);

  const sortedFiltered = useMemo(() => {
    if (!sortKey) return filtered;
    return [...filtered].sort((a, b) => {
      const av = a[sortKey], bv = b[sortKey];
      if (typeof av === 'string') return sortDir === 'asc' ? av.localeCompare(bv) : bv.localeCompare(av);
      return sortDir === 'asc' ? av - bv : bv - av;
    });
  }, [filtered, sortKey, sortDir]);

  const toggle = useCallback((ticker) => {
    setConfirmed(false); setPersona(null);
    setWatchlist(w => w.includes(ticker) ? w.filter(x => x !== ticker) : [...w, ticker]);
  }, [setConfirmed, setPersona, setWatchlist]);

  const selectAll = useCallback(() => {
    setConfirmed(false); setPersona(null);
    setWatchlist(w => { const s = new Set(w); filtered.forEach(a => s.add(a.ticker)); return Array.from(s); });
  }, [filtered, setConfirmed, setPersona, setWatchlist]);

  const deselectAll = useCallback(() => {
    setConfirmed(false); setPersona(null);
    const tks = new Set(filtered.map(a => a.ticker));
    setWatchlist(w => w.filter(tk => !tks.has(tk)));
  }, [filtered, setConfirmed, setPersona, setWatchlist]);

  const applyPersona = (name) => {
    const p = PPL_PERSONAS[name];
    setWatchlist(p.watchlist); setPersona(name); setConfirmed(true);
  };

  const onSortCol = (key) => {
    if (!key) return;
    if (sortKey === key) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
    else { setSortKey(key); setSortDir('desc'); }
  };

  return (
    <div>
      <SectionTitle icon="🔍" title={t.screeningTitle} caption={t.screeningCaption} />
      <Accordion title={t.screeningCriteriaTitle}>
        {t.screeningCriteriaBody.map((p, i) => (
          <p key={i} style={{ fontSize:14, color:'#2d3e52', lineHeight:1.8, marginBottom: i < t.screeningCriteriaBody.length - 1 ? 14 : 0 }}>{p}</p>
        ))}
      </Accordion>

      <div style={{ display:'flex', gap:8, marginBottom:14, flexWrap:'wrap', alignItems:'center' }}>
        <input value={search} onChange={e => { setSearch(e.target.value); }}
          placeholder={t.searchPlaceholder}
          style={{ padding:'7px 12px', borderRadius:6, border:'1px solid #d0d7e2', fontSize:13, fontFamily:'inherit', width:195, outline:'none' }} />
        {CATEGORIES.map(c => (
          <button key={c} onClick={() => { setCat(c); }}
            style={{ padding:'6px 13px', borderRadius:6, border:'1px solid', fontSize:13, fontWeight:600, cursor:'pointer', fontFamily:'inherit', transition:'all 0.12s',
              borderColor:cat===c?'#4182b9':'#d0d7e2', background:cat===c?'#4182b9':'#fff', color:cat===c?'#fff':'#555' }}>
            {catLabel[c]}
          </button>
        ))}
        <select value={cagrMin} onChange={e => { setCagrMin(+e.target.value); }}
          style={{ padding:'7px 12px', borderRadius:6, border:'1px solid #d0d7e2', fontSize:13, fontFamily:'inherit', background:'#fff', cursor:'pointer' }}>

  purple: { bg:'rgba(107,57,196,0.12)', color:'#6b39c4' },
};

function clampEventsToLabels(events, labels) {
  if (!labels.length) return [];
  const first = labels[0];
  const last = labels[labels.length - 1];
  return events
    .filter(ev => ev.xMax >= first && ev.xMin <= last)
    .map(ev => {
      const minTarget = ev.xMin < first ? first : ev.xMin;
      const maxTarget = ev.xMax > last ? last : ev.xMax;
      const xMin = labels.find(label => label >= minTarget);
      const xMax = [...labels].reverse().find(label => label <= maxTarget);
      return xMin && xMax && xMin <= xMax ? { ...ev, xMin, xMax } : null;
    })
    .filter(Boolean);
}

                <div style={{ width:8, height:8, borderRadius:2, background:c.color, opacity:0.8 }} />
                <span style={{ fontSize:11, fontWeight:600, color:c.color }}>{lbl}</span>
              </div>
            );
          })}
        </div>
        <ChartLine labels={labels} height={300} yFmt={fmtMoneyShort} events={visEv} extraInfo={drawdowns} lang={lang}
          datasets={[
            { label:lang==='zh'?'組合價值':'Portfolio Value', data:portVals, borderColor:'#4182b9', backgroundColor:'rgba(65,130,185,0.07)', borderWidth:2, pointRadius:0, fill:true, tension:0.35 },
            { label:lang==='zh'?'累計投入':'Total Invested',  data:invested, borderColor:'#a8cae8', backgroundColor:'transparent', borderWidth:1.5, pointRadius:0, borderDash:[5,4], tension:0.35 },
          ]} />
      </div>
      <div style={{ ...CARD, padding:'20px 20px 16px', marginBottom:14 }}>
        <div style={{ display:'flex', alignItems:'baseline', gap:12, marginBottom:14, flexWrap:'wrap' }}>
          <div style={{ fontWeight:700, fontSize:14, color:'#0d1f3c' }}>{t.btPainIndex}</div>
          <div style={{ fontSize:12, color:'#e53e3e', fontWeight:700 }}>{t.btWorst} {bt.maxDD.toFixed(1)}%</div>
          <div style={{ fontSize:11, color:'#888', marginLeft:'auto' }}>{t.btDashHint}</div>
        </div>
        <ChartLine labels={labels} height={200} yFmt={v=>v.toFixed(1)+'%'} events={visEv} lang={lang}
          hLines={[
            { value:-10, label:'-10%', color:'rgba(229,62,62,0.40)' },
            { value:-20, label:'-20%', color:'rgba(229,62,62,0.55)' },
            { value:-30, label:'-30%', color:'rgba(180,0,0,0.55)'   },
          ]}
          datasets={[
            { label:lang==='zh'?'回撤 %':'Drawdown %', data:drawdowns, borderColor:'#e53e3e', backgroundColor:'rgba(229,62,62,0.07)', borderWidth:1.5, pointRadius:0, fill:true, tension:0.3 },
          ]} />
      </div>
      <div style={{ background:'#fff', border:'1px solid #e8edf3', borderRadius:10, padding:'20px 20px 16px', marginBottom:20, boxShadow:'0 1px 3px rgba(0,0,0,0.05)' }}>
        <div style={{ fontWeight:700, fontSize:14, color:'#0d1f3c', marginBottom:14 }}>{t.btAnnualReturns}</div>
        <ChartBar labels={bt.annualReturns.map(r=>r.year)} data={bt.annualReturns.map(r=>r.ret)} />
      </div>
      <div style={{ fontWeight:700, fontSize:14, color:'#0d1f3c', marginBottom:10 }}>{t.btTopEpisodes}</div>
      <div className="ppl-grid-3" style={{ display:'grid', gap:12 }}>
        {t.btEpisodes.map((ep,i) => {
          const ddVal = i===0?(bt.maxDD<-25?bt.maxDD.toFixed(1):'-28.4'):(i===1?'-24.1':'-16.3');
          return (
            <div key={ep.label} style={{ background:'#fff', border:'1px solid #e8edf3', borderRadius:10, padding:'14px 16px', boxShadow:'0 1px 3px rgba(0,0,0,0.05)' }}>
              <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:8 }}>
                <div style={{ width:24, height:24, borderRadius:6, background:'#eff5fb', display:'flex', alignItems:'center', justifyContent:'center', fontSize:12, fontWeight:700, color:'#1e5a96' }}>{i+1}</div>
                <div style={{ fontWeight:700, fontSize:13, color:'#0d1f3c' }}>{ep.label}</div>
              </div>
              <div style={{ fontSize:12, color:'#888', marginBottom:8 }}>{ep.period}</div>
              <div style={{ display:'flex', gap:20 }}>
                <div>
                  <div style={{ fontSize:11, color:'#888' }}>{t.btPeakDD}</div>
                  <div style={{ fontSize:22, fontWeight:700, color:'#e53e3e' }}>{ddVal}%</div>
                </div>
                <div>
                  <div style={{ fontSize:11, color:'#888' }}>{t.btRecovery}</div>
                  <div style={{ fontSize:22, fontWeight:700, color:'#4182b9' }}>{ep.recovery}</div>
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
};

// ── Section: FIRE Calculator ──────────────────────────────────────────────────
const FireSection = ({ t, confirmed, btCagr, displayCurrency }) => {
  const defaultCagr = btCagr ? (btCagr*100).toFixed(1) : '8.0';
  const [expenses,  setExpenses]  = useState(720000);
  const [savings,   setSavings]   = useState(500000);
  const [contrib,   setContrib]   = useState(20000);
  const [cagrInput, setCagrInput] = useState(defaultCagr);
  const [withdraw,  setWithdraw]  = useState(4);
  const [inflation, setInflation] = useState(2.5);

  useEffect(() => { if (btCagr) setCagrInput((btCagr*100).toFixed(1)); }, [btCagr]);

  const fire = useMemo(() => calculateFIRE({
    cagr:cagrInput/100, currentSavings:savings, monthlyContrib:contrib,
    annualExpenses:expenses, withdrawalRate:withdraw/100, inflation:inflation/100,
  }), [cagrInput, savings, contrib, expenses, withdraw, inflation]);

  const fmtDisplay = v => formatMoney(v, displayCurrency, true);

  if (!confirmed) return (
    <div>
      <SectionTitle icon="🔥" title={t.fireTitle} caption={t.fireCaption} />
      <InfoBanner>{t.fireLocked}</InfoBanner>
    </div>
  );

  return (
    <div>
      <SectionTitle icon="🔥" title={t.fireTitle} caption={t.fireCaption} />
      <div className="ppl-grid-2" style={{ display:'grid', gap:24 }}>
        <div style={{ background:'#fff', border:'1px solid #e8edf3', borderRadius:10, padding:'20px 24px', boxShadow:'0 1px 3px rgba(0,0,0,0.05)' }}>
          <div style={{ fontWeight:700, fontSize:14, color:'#0d1f3c', marginBottom:18 }}>{t.fireParams}</div>
          {[[t.fireAnnualExp,expenses,setExpenses,10000],[t.fireCurrentSav,savings,setSavings,50000],[t.fireMonthlyContrib,contrib,setContrib,1000]].map(([label,val,setter,step]) => (
            <div key={label} style={{ marginBottom:14 }}>
              <div style={LABEL_SM}>{label}</div>
              <input type="number" value={val} step={step} onChange={e => setter(+e.target.value)}
                style={{ width:'100%', padding:'8px 12px', borderRadius:6, border:'1px solid #d0d7e2', fontSize:13, fontFamily:'inherit', outline:'none' }} />
            </div>
          ))}
          <div className="ppl-grid-3" style={{ display:'grid', gap:10 }}>
            {[[t.fireCagr,cagrInput,setCagrInput,0.1],[t.fireWithdraw,withdraw,setWithdraw,0.5],[t.fireInflation,inflation,setInflation,0.5]].map(([label,val,setter,step]) => (
              <div key={label}>
                <div style={{ fontSize:11, fontWeight:600, color:'#555', marginBottom:4 }}>{label}</div>
                <input type="number" value={val} step={step} onChange={e => setter(+e.target.value)}
                  style={{ width:'100%', padding:'7px 10px', borderRadius:6, border:'1px solid #d0d7e2', fontSize:13, fontFamily:'inherit', outline:'none' }} />
              </div>
            ))}
          </div>
        </div>
        <div>
          <div className="ppl-grid-2" style={{ display:'grid', gap:12, marginBottom:16 }}>
            <MetricCard label={t.fireTarget}    value={fmtDisplay(fire.target)} sub={`${formatMoney(expenses, displayCurrency)} ÷ ${withdraw}%`} />
            <MetricCard label={t.fireYearsNom}  value={fire.yearsNominal!=null?fire.yearsNominal+' yrs':t.fireYrsPlus} />
            <MetricCard label={t.fireYearsReal} value={fire.yearsReal!=null?fire.yearsReal+' yrs':t.fireYrsPlus} />
            <MetricCard label={t.fireCagrUsed}  value={parseFloat(cagrInput).toFixed(1)+'%'}
              sub={btCagr?t.fireCagrFrom:t.fireCagrManual} />
          </div>
          <div style={{ background:'#fff', border:'1px solid #e8edf3', borderRadius:10, padding:'16px 20px', boxShadow:'0 1px 3px rgba(0,0,0,0.05)' }}>
            <div style={{ fontWeight:600, fontSize:14, color:'#0d1f3c', marginBottom:14 }}>{t.fireProjection}</div>
            <ChartLine labels={fire.labels}
              yFmt={v=>formatMoney(v, displayCurrency, true)}
              datasets={[
                { label:t.fireNominal,    data:fire.nomVals,  borderColor:'#4182b9', backgroundColor:'rgba(65,130,185,0.10)', borderWidth:2, pointRadius:0, fill:true, tension:0.4 },
                { label:t.fireReal,       data:fire.realVals, borderColor:'#72a8d4', backgroundColor:'transparent', borderWidth:1.5, pointRadius:0, borderDash:[5,4], tension:0.4 },
                { label:t.fireTargetLine, data:fire.labels.map(()=>fire.target), borderColor:'#e53e3e', backgroundColor:'transparent', borderWidth:1.5, pointRadius:0, borderDash:[8,4] },
              ]} />
          </div>
        </div>
      </div>
    </div>
  );
};

// ── Section: Summary ──────────────────────────────────────────────────────────
const SummarySection = ({ t, lang, watchlist, allocation, riskLevel, btCagr, confirmed }) => {
  if (!confirmed || !Object.keys(allocation).length) return (
    <div>
      <SectionTitle icon="📋" title={t.summaryTitle} caption={t.summaryCaption} />
      <InfoBanner>{t.summaryLocked}</InfoBanner>
    </div>
  );

  const allItems = Object.entries(allocation)
    .map(([tk,w]) => { const a=assetMap.get(tk); return { ticker:tk, weight:w, name:a?.name, cagr:a?.cagr }; })
    .filter(x=>x.name).sort((a,b) => b.weight-a.weight);
  const topAssets = allItems.slice(0,3).map(a=>`${a.ticker} (${(a.weight*100).toFixed(0)}%)`).join(', ');
  const riskLabel = t[RISK_LABEL_KEY[riskLevel]] || riskLevel;
  const insights  = generatePortfolioInsights(allocation, riskLevel, btCagr, lang);

  return (
    <div>
      <SectionTitle icon="📋" title={t.summaryTitle} caption={t.summaryCaption} />
      <div className="ppl-grid-2" style={{ display:'grid', gap:16 }}>
        <div style={{ background:'#fff', border:'1px solid #e8edf3', borderRadius:10, padding:'20px 24px', boxShadow:'0 1px 3px rgba(0,0,0,0.05)' }}>
          <div style={{ fontWeight:700, fontSize:15, color:'#0d1f3c', marginBottom:16 }}>{t.summaryStructure}</div>
          <div style={{ fontSize:14, color:'#333', lineHeight:2 }}>
            <div>{t.summaryRisk} <strong>{riskLabel}</strong></div>
            <div>{t.summaryAssets} <strong>{watchlist.length}</strong></div>
            <div>{t.summaryTop} <strong style={{ color:'#0a326e' }}>{topAssets}</strong></div>
            {btCagr && <div>{t.summaryCagr} <strong style={{ color:'#21a350' }}>{(btCagr*100).toFixed(2)}%</strong></div>}
          </div>
          <div style={{ marginTop:18, padding:'12px 16px', background:'#f7f9fc', borderRadius:8, fontSize:13, color:'#555', lineHeight:1.7 }}>
            <span dangerouslySetInnerHTML={{ __html:t.summaryNote }} />
          </div>
        </div>

        <div style={{ background:'linear-gradient(135deg,#0d1f3c 0%,#1e5a96 100%)', borderRadius:10, padding:'20px 24px', color:'#fff' }}>
          <div style={{ fontWeight:700, fontSize:15, marginBottom:4 }}>{t.summaryAI}</div>
          <div style={{ fontSize:12, color:'rgba(255,255,255,0.5)', marginBottom:16 }}>{t.summaryAITagline}</div>
          <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
            {insights.map((ins,i) => (
              <div key={i} style={{ background:'rgba(255,255,255,0.09)', borderRadius:8, padding:'11px 14px', fontSize:13, color:'rgba(255,255,255,0.88)', lineHeight:1.7 }}>
                {ins}
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
};

// ── Instruction popup ─────────────────────────────────────────────────────────
const InstructionPopup = ({ lang, t, onClose }) => {
  const isZh = lang === 'zh';
  const steps = t.introHowSteps || [];
  return (
    <div id="ppl-help-overlay" onClick={e => { if (e.target.id === 'ppl-help-overlay') onClose(); }}>
      <div id="ppl-help-box">
        <h2>{isZh ? '如何使用本工具' : 'How to use this tool'}</h2>
        <div className="help-sub">
          {isZh
            ? '依照以下六個步驟，完成你的被動投資組合分析。'
            : 'Follow these six steps to build your passive portfolio analysis.'}
        </div>
        {steps.map(s => (
          <div key={s.step} className="help-step">
            <div className="help-num">{s.step}</div>
            <div className="help-text"><strong>{s.title}</strong><br />{s.desc}</div>
          </div>
        ))}
        <div className="help-note">
          {isZh
            ? '💡 所有計算以新台幣（TWD）為基礎。美元顯示僅為換算參考，不影響底層數字。'
            : '💡 All calculations are in TWD. The USD toggle is display-only and does not affect underlying computations.'}
        </div>
        <button id="ppl-help-close" onClick={onClose}>
          {isZh ? '開始使用 →' : 'Get started →'}
        </button>
      </div>
    </div>
  );
};

// ── Main App — single-page scrollable layout ──────────────────────────────────
const SECTION_STYLE = { padding:'44px 48px' };
const DIVIDER       = { borderTop:'2px solid #f0f2f6' };

const App = () => {
  const [lang,       setLang]       = useState('zh');
  const [activeNav,  setActiveNav]  = useState('intro');
  const [watchlist,  setWatchlist]  = useState([]);
  const [confirmed,  setConfirmed]  = useState(false);
  const [persona,    setPersona]    = useState(null);
  const [riskLevel,  setRiskLevel]  = useState('Medium');
  const [allocation, setAllocation] = useState({});
  const [initial,    setInitial]    = useState(300000);
  const [monthly,    setMonthly]    = useState(15000);
  const [displayCurrency, setDisplayCurrency] = useState('TWD');
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [showHelp,    setShowHelp]    = useState(false);

  const mainRef = useRef();
  const t = T[lang] || T.en;

  // Show popup on first visit
  useEffect(() => {
    if (!localStorage.getItem('ppl_help_seen')) setShowHelp(true);
  }, []);

  const closeHelp = () => {
    localStorage.setItem('ppl_help_seen', '1');
    setShowHelp(false);
  };

  const toggleSidebar = () => setSidebarOpen(o => !o);
  const closeSidebar  = () => setSidebarOpen(false);

  const scrollTo = useCallback((id) => {
    const el   = document.getElementById('section-'+id);
    const main = mainRef.current;
    if (!el || !main) return;
    main.scrollTo({ top: el.offsetTop - 20, behavior:'smooth' });
  }, []);

  const handleNav = useCallback((id) => {
    scrollTo(id);
    setSidebarOpen(false);
  }, [scrollTo]);

  const backtestResult = useMemo(() => {
    if (!confirmed || !Object.keys(allocation).length) return null;
    return generateBacktest(allocation, initial, monthly);
  }, [allocation, confirmed, initial, monthly]);

  const btCagr = backtestResult?.cagr ?? null;

  // Track active section while scrolling
  useEffect(() => {
    const main = mainRef.current;
    if (!main) return;
    const onScroll = () => {
      const top = main.scrollTop + 120;
      let cur = 'intro';
      for (const { id } of NAV_ITEMS) {
        const el = document.getElementById('section-'+id);
        if (el && el.offsetTop <= top) cur = id;
      }
      setActiveNav(cur);
    };
    main.addEventListener('scroll', onScroll, { passive:true });
    return () => main.removeEventListener('scroll', onScroll);
  }, []);

  const sectionProps = {
    t, lang, watchlist, setWatchlist, confirmed, setConfirmed,
    persona, setPersona, riskLevel, setRiskLevel,
    allocation, setAllocation, initial, setInitial, monthly, setMonthly,
    btCagr, backtestResult, displayCurrency, setDisplayCurrency,
  };

  return (
    <div style={{ display:'flex', minHeight:'100vh', width:'100%', fontFamily:"'Source Sans 3',system-ui,sans-serif", background:'#f7f9fc' }}>
      <div id="ppl-sidebar-overlay" className={sidebarOpen ? 'overlay-open' : ''} onClick={closeSidebar} />
      <Sidebar active={activeNav} onNav={handleNav} lang={lang} setLang={setLang} t={t} confirmed={confirmed}
        onClose={closeSidebar} className={sidebarOpen ? 'sidebar-open' : ''} />
      <main id="ppl-main" ref={mainRef} style={{ flex:1, overflowY:'auto', minWidth:0 }}>
        <AppHeader t={t} lang={lang} displayCurrency={displayCurrency} setDisplayCurrency={setDisplayCurrency}
          onToggleSidebar={toggleSidebar} onHelp={() => setShowHelp(true)} />
        <div id="section-intro"       style={SECTION_STYLE}><IntroSection       {...sectionProps} /></div>
        <div style={DIVIDER} />
        <div id="section-screening"   style={SECTION_STYLE}><AssetScreening     {...sectionProps} onReviewPortfolio={() => scrollTo('correlation')} /></div>
        <div style={DIVIDER} />
        <div id="section-correlation" style={SECTION_STYLE}><CorrelationSection {...sectionProps} lang={lang} /></div>
        <div style={DIVIDER} />
        <div id="section-allocation"  style={SECTION_STYLE}><RiskAllocation     {...sectionProps} /></div>
        <div style={DIVIDER} />
        <div id="section-backtest"    style={SECTION_STYLE}><BacktestSection     {...sectionProps} /></div>
        <div style={DIVIDER} />
        <div id="section-fire"        style={SECTION_STYLE}><FireSection         {...sectionProps} /></div>
        <div style={DIVIDER} />
        <div id="section-summary"     style={SECTION_STYLE}><SummarySection      {...sectionProps} /></div>
        <div style={{ height:80 }} />
      </main>
      {showHelp && <InstructionPopup lang={lang} t={t} onClose={closeHelp} />}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

  <script>
    (function waitForRoot() {
      const observer = new MutationObserver(() => {
        const root = document.getElementById('root');
        if (root && root.children.length > 0) {
          const loader = document.getElementById('loading');
          if (loader) loader.style.display = 'none';
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById('root'), { childList:true });
    })();
  </script>
</body>
</html>
