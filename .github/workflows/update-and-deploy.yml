name: Update data and deploy to GitHub Pages

on:
  push:
    branches: [main]          # Deploy on every push to main
  schedule:
    - cron: '0 17 * * *'     # Daily at 17:00 UTC = 01:00 Taiwan time (UTC+8)
  workflow_dispatch:           # Allow manual trigger from GitHub UI

permissions:
  contents: write              # Needed to commit updated ppl-data.js
  pages: write
  id-token: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python setup ────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          pip install --quiet \
            pandas \
            pandas-gbq \
            google-cloud-bigquery \
            pyarrow \
            requests \
            python-dotenv

      # ── 3. Authenticate to Google Cloud ────────────────────────────────────
      - name: Write GCP service account key
        run: echo '${{ secrets.GCP_SA_KEY }}' > /tmp/gcp-sa-key.json

      # ── 4. Export fresh data from BigQuery → ppl-data.js ──────────────────
      - name: Export web data
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-sa-key.json
          GOOGLE_CLOUD_PROJECT: passive-portfolio-lab
          BIGQUERY_DATASET: passive_portfolio
        run: python github_web/scripts/export_web_data.py

      # ── 5. Validate exported data (before commit so bad data never lands) ──
      - name: Validate export
        run: python github_web/scripts/validate_export.py

      # ── 6. Commit updated ppl-data.js if anything changed ─────────────────
      - name: Commit data update
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add github_web/src/ppl-data.js
          if git diff --staged --quiet; then
            echo "ppl-data.js unchanged — nothing to commit"
          else
            git commit -m "chore: auto-update ppl-data.js from BigQuery [skip ci]"
            git push
          fi

      # ── 7. Write job summary ───────────────────────────────────────────────
      - name: Export summary
        run: |
          echo "## Export Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          UPDATED_AT=$(grep -o 'PPL_HISTORY_UPDATED_AT = "[^"]*"' github_web/src/ppl-data.js \
            | cut -d'"' -f2)
          ASSET_COUNT=$(grep -c '{ ticker:' github_web/src/ppl-data.js || echo "?")
          FX=$(grep -o 'PPL_FX_RATE = [0-9.]*' github_web/src/ppl-data.js | cut -d' ' -f3)
          echo "| Updated at | $UPDATED_AT |" >> $GITHUB_STEP_SUMMARY
          echo "| Assets exported | $ASSET_COUNT |" >> $GITHUB_STEP_SUMMARY
          echo "| FX rate (TWD/USD) | $FX |" >> $GITHUB_STEP_SUMMARY

      # ── 8. Upload ppl-data.js artifact for 7-day debugging window ─────────
      - name: Upload export artifact
        uses: actions/upload-artifact@v4
        with:
          name: ppl-data-${{ github.run_id }}
          path: github_web/src/ppl-data.js
          retention-days: 7

      # ── 9. Deploy github_web/ to GitHub Pages ──────────────────────────────
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./github_web

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
