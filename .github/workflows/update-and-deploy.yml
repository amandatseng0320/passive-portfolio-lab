name: Update data and deploy to GitHub Pages

on:
  push:
    branches: [main]          # Deploy on every push to main
  schedule:
    - cron: '0 17 * * *'     # Daily at 17:00 UTC = 01:00 Taiwan time (UTC+8)
  workflow_dispatch:           # Allow manual trigger from GitHub UI

permissions:
  contents: write              # Needed to commit updated ppl-data.js
  pages: write
  id-token: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python setup ────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          pip install --quiet \
            pandas \
            pandas-gbq \
            google-cloud-bigquery \
            pyarrow \
            requests \
            python-dotenv

      # ── 3. Authenticate to Google Cloud ────────────────────────────────────
      - name: Write GCP service account key
        run: echo '${{ secrets.GCP_SA_KEY }}' > /tmp/gcp-sa-key.json

      # ── 4. Export fresh data from BigQuery → ppl-data.js ──────────────────
      - name: Export web data
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-sa-key.json
          GOOGLE_CLOUD_PROJECT: passive-portfolio-lab
          BIGQUERY_DATASET: passive_portfolio
        run: python github_web/scripts/export_web_data.py

      # ── 5. Commit updated ppl-data.js if anything changed ─────────────────
      - name: Commit data update
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add github_web/src/ppl-data.js
          if git diff --staged --quiet; then
            echo "ppl-data.js unchanged — nothing to commit"
          else
            git commit -m "chore: auto-update ppl-data.js from BigQuery [skip ci]"
            git push
          fi

      # ── 6. Deploy github_web/ to GitHub Pages ──────────────────────────────
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./github_web

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
